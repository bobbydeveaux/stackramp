name: "StackRamp Config Parser"
description: "Parse and validate stackramp.yaml configuration"

inputs:
  config_path:
    description: "Path to stackramp.yaml"
    required: false
    default: "stackramp.yaml"

outputs:
  app_name:
    description: "Application name"
    value: ${{ steps.parse.outputs.app_name }}
  has_frontend:
    description: "Whether the app has a frontend"
    value: ${{ steps.parse.outputs.has_frontend }}
  frontend_framework:
    description: "Frontend framework (react, vue, next, static, none)"
    value: ${{ steps.parse.outputs.frontend_framework }}
  frontend_dir:
    description: "Frontend directory"
    value: ${{ steps.parse.outputs.frontend_dir }}
  has_backend:
    description: "Whether the app has a backend"
    value: ${{ steps.parse.outputs.has_backend }}
  backend_language:
    description: "Backend language (python, go, node, none)"
    value: ${{ steps.parse.outputs.backend_language }}
  backend_dir:
    description: "Backend directory"
    value: ${{ steps.parse.outputs.backend_dir }}
  backend_port:
    description: "Backend port"
    value: ${{ steps.parse.outputs.backend_port }}
  has_database:
    description: "Whether the app uses a database"
    value: ${{ steps.parse.outputs.has_database }}
  provider:
    description: "Cloud provider"
    value: ${{ steps.parse.outputs.provider }}
  custom_domain:
    description: "Custom domain from stackramp.yaml, or {app_name}.{STACKRAMP_BASE_DOMAIN} if base domain is set"
    value: ${{ steps.parse.outputs.custom_domain }}
  has_storage:
    description: "Whether the app uses GCS storage"
    value: ${{ steps.parse.outputs.has_storage }}
  storage_type:
    description: "Storage type (gcs or false)"
    value: ${{ steps.parse.outputs.storage_type }}

runs:
  using: "composite"
  steps:
    - name: Install yq
      shell: bash
      run: |
        if ! command -v yq &> /dev/null; then
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        fi

    - name: Parse and validate stackramp.yaml
      id: parse
      shell: bash
      run: |
        CONFIG="${{ inputs.config_path }}"
        if [ ! -f "$CONFIG" ]; then
          echo "::error::$CONFIG not found. Add a stackramp.yaml to your repo root."
          exit 1
        fi

        APP_NAME=$(yq '.name // ""' "$CONFIG")
        if [ -z "$APP_NAME" ] || [ "$APP_NAME" = "null" ]; then
          echo "::error::stackramp.yaml must have a 'name' field."
          exit 1
        fi

        FRONTEND_FRAMEWORK=$(yq '.frontend.framework // "none"' "$CONFIG")
        FRONTEND_DIR=$(yq '.frontend.dir // "frontend"' "$CONFIG")
        BACKEND_LANG=$(yq '.backend.language // "none"' "$CONFIG")
        BACKEND_DIR=$(yq '.backend.dir // "backend"' "$CONFIG")
        BACKEND_PORT=$(yq '.backend.port // 8080' "$CONFIG")
        DATABASE=$(yq '.database // false' "$CONFIG")
        PROVIDER="${STACKRAMP_PROVIDER:-$(yq '.provider.cloud // "gcp"' "$CONFIG")}"

        # Domain: explicit in yaml > app_name.BASE_DOMAIN > empty
        EXPLICIT_DOMAIN=$(yq '.domain // ""' "$CONFIG")
        if [ -n "$EXPLICIT_DOMAIN" ] && [ "$EXPLICIT_DOMAIN" != "null" ]; then
          CUSTOM_DOMAIN="$EXPLICIT_DOMAIN"
        elif [ -n "${STACKRAMP_BASE_DOMAIN:-}" ]; then
          CUSTOM_DOMAIN="${APP_NAME}.${STACKRAMP_BASE_DOMAIN}"
        else
          CUSTOM_DOMAIN=""
        fi

        HAS_FRONTEND="false"
        [ "$FRONTEND_FRAMEWORK" != "none" ] && [ "$FRONTEND_FRAMEWORK" != "null" ] && HAS_FRONTEND="true"

        HAS_BACKEND="false"
        [ "$BACKEND_LANG" != "none" ] && [ "$BACKEND_LANG" != "null" ] && HAS_BACKEND="true"

        if [ "$HAS_FRONTEND" = "false" ] && [ "$HAS_BACKEND" = "false" ]; then
          echo "::error::stackramp.yaml must define at least one of frontend or backend."
          exit 1
        fi

        HAS_DATABASE="false"
        [ "$DATABASE" != "false" ] && [ "$DATABASE" != "null" ] && HAS_DATABASE="true"

        STORAGE=$(yq e '.storage // "false"' "$CONFIG")
        if [ "$STORAGE" = "gcs" ]; then
          HAS_STORAGE="true"
          STORAGE_TYPE="gcs"
        else
          HAS_STORAGE="false"
          STORAGE_TYPE="false"
        fi

        echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
        echo "has_frontend=$HAS_FRONTEND" >> $GITHUB_OUTPUT
        echo "frontend_framework=$FRONTEND_FRAMEWORK" >> $GITHUB_OUTPUT
        echo "frontend_dir=$FRONTEND_DIR" >> $GITHUB_OUTPUT
        echo "has_backend=$HAS_BACKEND" >> $GITHUB_OUTPUT
        echo "backend_language=$BACKEND_LANG" >> $GITHUB_OUTPUT
        echo "backend_dir=$BACKEND_DIR" >> $GITHUB_OUTPUT
        echo "backend_port=$BACKEND_PORT" >> $GITHUB_OUTPUT
        echo "has_database=$HAS_DATABASE" >> $GITHUB_OUTPUT
        echo "provider=$PROVIDER" >> $GITHUB_OUTPUT
        echo "has_storage=$HAS_STORAGE" >> $GITHUB_OUTPUT
        echo "storage_type=$STORAGE_TYPE" >> $GITHUB_OUTPUT
        echo "custom_domain=$CUSTOM_DOMAIN" >> $GITHUB_OUTPUT

        echo "App: $APP_NAME"
        echo "Frontend: $FRONTEND_FRAMEWORK ($FRONTEND_DIR)"
        echo "Backend: $BACKEND_LANG ($BACKEND_DIR:$BACKEND_PORT)"
        echo "Database: $DATABASE"
        echo "Storage: $STORAGE"
        echo "Provider: $PROVIDER"
