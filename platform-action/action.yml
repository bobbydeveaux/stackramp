name: "StackRamp Config Parser"
description: "Parse and validate stackramp.yaml configuration"

inputs:
  config_path:
    description: "Path to stackramp.yaml"
    required: false
    default: "stackramp.yaml"

outputs:
  app_name:
    description: "Application name"
    value: ${{ steps.parse.outputs.app_name }}
  has_frontend:
    description: "Whether the app has a frontend"
    value: ${{ steps.parse.outputs.has_frontend }}
  frontend_framework:
    description: "Frontend framework (react, vue, next, static, none)"
    value: ${{ steps.parse.outputs.frontend_framework }}
  frontend_dir:
    description: "Frontend directory"
    value: ${{ steps.parse.outputs.frontend_dir }}
  has_backend:
    description: "Whether the app has a backend"
    value: ${{ steps.parse.outputs.has_backend }}
  backend_language:
    description: "Backend language (python, go, node, rust, none)"
    value: ${{ steps.parse.outputs.backend_language }}
  backend_dir:
    description: "Backend directory"
    value: ${{ steps.parse.outputs.backend_dir }}
  backend_port:
    description: "Backend port"
    value: ${{ steps.parse.outputs.backend_port }}
  min_instances:
    description: "Minimum Cloud Run instances (default 0)"
    value: ${{ steps.parse.outputs.min_instances }}
  has_database:
    description: "Whether the app uses a database"
    value: ${{ steps.parse.outputs.has_database }}
  provider:
    description: "Cloud provider"
    value: ${{ steps.parse.outputs.provider }}
  custom_domain:
    description: "Custom domain from stackramp.yaml, or {app_name}.{STACKRAMP_BASE_DOMAIN} if base domain is set"
    value: ${{ steps.parse.outputs.custom_domain }}
  has_storage:
    description: "Whether the app uses GCS storage"
    value: ${{ steps.parse.outputs.has_storage }}
  storage_type:
    description: "Storage type (gcs or false)"
    value: ${{ steps.parse.outputs.storage_type }}
  storage_buckets:
    description: "JSON array of storage.buckets configs ([] when none or scalar form). Each entry: {name, access, signed_urls, lifecycle_days}."
    value: ${{ steps.parse.outputs.storage_buckets }}
  has_sso:
    description: "Whether SSO (IAP) is enabled for this app"
    value: ${{ steps.parse.outputs.has_sso }}
  migrate_command:
    description: "Migration command to run before deploy (empty = no migrations)"
    value: ${{ steps.parse.outputs.migrate_command }}
  security_enabled:
    description: "Whether Guardian security scanning is enabled"
    value: ${{ steps.parse.outputs.security_enabled }}
  security_scan_osv:
    description: "Whether OSV dependency scanning is enabled"
    value: ${{ steps.parse.outputs.security_scan_osv }}
  security_scan_secrets:
    description: "Whether secrets detection is enabled"
    value: ${{ steps.parse.outputs.security_scan_secrets }}
  security_scan_sast:
    description: "Whether AI SAST is enabled"
    value: ${{ steps.parse.outputs.security_scan_sast }}
  security_fail_on_findings:
    description: "Whether to fail on security findings"
    value: ${{ steps.parse.outputs.security_fail_on_findings }}
  quality_enabled:
    description: "Whether Pulse quality gates are enabled"
    value: ${{ steps.parse.outputs.quality_enabled }}
  quality_max_ccn:
    description: "Max cyclomatic complexity per function"
    value: ${{ steps.parse.outputs.quality_max_ccn }}
  quality_max_cognitive:
    description: "Max cognitive complexity per function"
    value: ${{ steps.parse.outputs.quality_max_cognitive }}
  quality_max_duplication:
    description: "Max duplication percentage"
    value: ${{ steps.parse.outputs.quality_max_duplication }}
  quality_min_maintainability:
    description: "Min maintainability index"
    value: ${{ steps.parse.outputs.quality_min_maintainability }}
  quality_fail_on_gate:
    description: "Whether to fail on quality gate breaches"
    value: ${{ steps.parse.outputs.quality_fail_on_gate }}
  has_mcp:
    description: "Whether the app has an MCP server"
    value: ${{ steps.parse.outputs.has_mcp }}
  mcp_language:
    description: "MCP server language (go, python, node, rust)"
    value: ${{ steps.parse.outputs.mcp_language }}
  mcp_dir:
    description: "MCP server directory"
    value: ${{ steps.parse.outputs.mcp_dir }}
  mcp_port:
    description: "MCP server port"
    value: ${{ steps.parse.outputs.mcp_port }}
  mcp_memory:
    description: "MCP server Cloud Run memory"
    value: ${{ steps.parse.outputs.mcp_memory }}
  mcp_cpu:
    description: "MCP server Cloud Run CPU"
    value: ${{ steps.parse.outputs.mcp_cpu }}
  mcp_public:
    description: "Whether the MCP service allows unauthenticated invocation (auth enforced in-app)"
    value: ${{ steps.parse.outputs.mcp_public }}
  mcp_service_accounts:
    description: "Semicolon-joined SA emails allowed to call the MCP service with Google-signed ID tokens (from mcp.allowed_service_accounts)"
    value: ${{ steps.parse.outputs.mcp_service_accounts }}
  has_kubernetes:
    description: "Whether the app declares a kubernetes: block (Helm release on the shared GKE cluster)"
    value: ${{ steps.parse.outputs.has_kubernetes }}
  kubernetes_chart:
    description: "Path to the app's Helm chart"
    value: ${{ steps.parse.outputs.kubernetes_chart }}
  kubernetes_namespace:
    description: "Namespace the Helm release is installed into"
    value: ${{ steps.parse.outputs.kubernetes_namespace }}
  kubernetes_values:
    description: "Inline Helm value overrides (compact JSON)"
    value: ${{ steps.parse.outputs.kubernetes_values }}
  kubernetes_images:
    description: "Images to build+push before helm install (compact JSON array)"
    value: ${{ steps.parse.outputs.kubernetes_images }}

runs:
  using: "composite"
  steps:
    - name: Install yq
      shell: bash
      run: |
        if ! command -v yq &> /dev/null; then
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        fi

    - name: Parse and validate stackramp.yaml
      id: parse
      shell: bash
      run: |
        CONFIG="${{ inputs.config_path }}"
        if [ ! -f "$CONFIG" ]; then
          echo "::error::$CONFIG not found. Add a stackramp.yaml to your repo root."
          exit 1
        fi

        APP_NAME=$(yq '.name // ""' "$CONFIG")
        if [ -z "$APP_NAME" ] || [ "$APP_NAME" = "null" ]; then
          echo "::error::stackramp.yaml must have a 'name' field."
          exit 1
        fi

        FRONTEND_FRAMEWORK=$(yq '.frontend.framework // "none"' "$CONFIG")
        FRONTEND_DIR=$(yq '.frontend.dir // "frontend"' "$CONFIG")
        BACKEND_LANG=$(yq '.backend.language // "none"' "$CONFIG")
        BACKEND_DIR=$(yq '.backend.dir // "backend"' "$CONFIG")
        BACKEND_PORT=$(yq '.backend.port // 8080' "$CONFIG")
        MIN_INSTANCES=$(yq '.backend.min_instances // 0' "$CONFIG")
        DATABASE=$(yq '.database // false' "$CONFIG")
        PROVIDER="${STACKRAMP_PROVIDER:-$(yq '.provider.cloud // "gcp"' "$CONFIG")}"

        # Domain: explicit in yaml > app_name.BASE_DOMAIN > empty
        EXPLICIT_DOMAIN=$(yq '.domain // ""' "$CONFIG")
        if [ -n "$EXPLICIT_DOMAIN" ] && [ "$EXPLICIT_DOMAIN" != "null" ]; then
          CUSTOM_DOMAIN="$EXPLICIT_DOMAIN"
        elif [ -n "${STACKRAMP_BASE_DOMAIN:-}" ]; then
          CUSTOM_DOMAIN="${APP_NAME}.${STACKRAMP_BASE_DOMAIN}"
        else
          CUSTOM_DOMAIN=""
        fi

        HAS_FRONTEND="false"
        [ "$FRONTEND_FRAMEWORK" != "none" ] && [ "$FRONTEND_FRAMEWORK" != "null" ] && HAS_FRONTEND="true"

        HAS_BACKEND="false"
        [ "$BACKEND_LANG" != "none" ] && [ "$BACKEND_LANG" != "null" ] && HAS_BACKEND="true"

        # A deployable can be frontend, backend, mcp, OR kubernetes (a k8s app
        # runs its own workloads via its Helm chart — no Cloud Run frontend/
        # backend required). mcp/kubernetes are parsed further down; detect their
        # blocks inline here so the guard doesn't reject a valid k8s-only app.
        MCP_BLOCK_CHECK=$(yq '.mcp' "$CONFIG")
        K8S_BLOCK_CHECK=$(yq '.kubernetes' "$CONFIG")
        HAS_MCP_BLOCK="false"; { [ -n "$MCP_BLOCK_CHECK" ] && [ "$MCP_BLOCK_CHECK" != "null" ]; } && HAS_MCP_BLOCK="true"
        HAS_K8S_BLOCK="false"; { [ -n "$K8S_BLOCK_CHECK" ] && [ "$K8S_BLOCK_CHECK" != "null" ]; } && HAS_K8S_BLOCK="true"
        if [ "$HAS_FRONTEND" = "false" ] && [ "$HAS_BACKEND" = "false" ] && [ "$HAS_MCP_BLOCK" = "false" ] && [ "$HAS_K8S_BLOCK" = "false" ]; then
          echo "::error::stackramp.yaml must define at least one deployable: frontend, backend, mcp, or kubernetes."
          exit 1
        fi

        HAS_DATABASE="false"
        [ "$DATABASE" != "false" ] && [ "$DATABASE" != "null" ] && HAS_DATABASE="true"

        # storage: can be a scalar (false | gcs) for the legacy single bucket,
        # or a block ({ buckets: [...] }) declaring one or more named buckets.
        # Detect the block form by counting .storage.buckets entries. A scalar
        # storage value yields an empty length, so default to 0 and treat any
        # positive count as the block form. (Comparing the yq node tag, e.g.
        # "!!seq", is avoided — the "!" trips shell history expansion.)
        HAS_STORAGE="false"
        STORAGE_TYPE="false"
        STORAGE_BUCKETS="[]"
        BUCKET_COUNT=$(yq e '.storage.buckets | length' "$CONFIG" 2>/dev/null)
        [ -z "$BUCKET_COUNT" ] || [ "$BUCKET_COUNT" = "null" ] && BUCKET_COUNT=0
        if [ "$BUCKET_COUNT" -gt 0 ]; then
          # Block form: emit the buckets array as compact JSON for downstream
          # Terraform consumption. Apply defaults (access=private, signed_urls=false,
          # lifecycle_days=0) so the JSON is fully populated and self-describing.
          STORAGE_BUCKETS=$(yq e -o=json -I=0 '
            [.storage.buckets[] | {
              "name": .name,
              "access": (.access // "private"),
              "signed_urls": (.signed_urls // false),
              "lifecycle_days": (.lifecycle_days // 0)
            }]
          ' "$CONFIG")
          # Validate every bucket has a non-empty name; abort early with a clear error.
          if echo "$STORAGE_BUCKETS" | yq e -p=json '.[] | select(.name == null or .name == "")' - | grep -q .; then
            echo "::error::Every storage.buckets entry must have a non-empty 'name'."
            exit 1
          fi

          # Logical names must be unique. Terraform keys local.buckets by name, so
          # duplicates silently collapse (last-wins) and drop a bucket with no error.
          # Catch it here and name the offending logical bucket.
          DUP_NAME=$(echo "$STORAGE_BUCKETS" | yq e -p=json -o=tsv '.[].name' - | sort | uniq -d | head -n1)
          if [ -n "$DUP_NAME" ]; then
            echo "::error::Duplicate storage.buckets name '$DUP_NAME'. Each bucket must have a unique logical 'name'."
            exit 1
          fi

          # Public buckets are out of scope. access: public would otherwise produce a
          # bucket that is NOT actually anonymously readable (uniform access stays on
          # and allUsers is never granted), which is misleading. Reject it explicitly.
          PUBLIC_NAME=$(echo "$STORAGE_BUCKETS" | yq e -p=json -o=tsv '.[] | select(.access == "public") | .name' - | head -n1)
          if [ -n "$PUBLIC_NAME" ]; then
            echo "::error::storage.buckets entry '$PUBLIC_NAME' sets access: public, which is not yet supported. All StackRamp buckets are private (public access prevention enforced). Remove the access field or set it to 'private'."
            exit 1
          fi

          # GCS caps bucket names at 63 chars. The resolved name is
          # {project}-{app}-{env}-{name}; a long project prefix can push it over,
          # failing at terraform apply with an opaque GCS 400. Fail early here when
          # the project id is known (STACKRAMP_PROJECT, injected by the platform
          # workflow). The platform deploys to environments 'dev' and 'prod' from a
          # single parse, so check against the longest ('prod', 4 chars): if it fits
          # for prod it fits for dev. The Terraform precondition is the authoritative
          # backstop for any env not covered here.
          PROJECT_ID="${STACKRAMP_PROJECT:-}"
          if [ -n "$PROJECT_ID" ]; then
            WORST_ENV="prod"
            while IFS= read -r LOGICAL; do
              [ -z "$LOGICAL" ] && continue
              RESOLVED="${PROJECT_ID}-${APP_NAME}-${WORST_ENV}-${LOGICAL}"
              LEN=${#RESOLVED}
              if [ "$LEN" -gt 63 ]; then
                OVER=$((LEN - 63))
                echo "::error::Resolved GCS bucket name '$RESOLVED' for bucket '$LOGICAL' is $LEN characters, $OVER over the 63-char GCS limit. Shorten the bucket 'name' or app name."
                exit 1
              fi
            done < <(echo "$STORAGE_BUCKETS" | yq e -p=json -o=tsv '.[].name' -)
          fi

          { [ -z "$STORAGE_BUCKETS" ] || [ "$STORAGE_BUCKETS" = "null" ]; } && STORAGE_BUCKETS="[]"
          if [ "$STORAGE_BUCKETS" != "[]" ]; then
            STORAGE_TYPE="gcs"
          fi
        else
          STORAGE=$(yq e '.storage // "false"' "$CONFIG")
          if [ "$STORAGE" = "gcs" ]; then
            HAS_STORAGE="true"
            STORAGE_TYPE="gcs"
          fi
        fi

        FRONTEND_SSO=$(yq '.frontend.sso // false' "$CONFIG")
        BACKEND_SSO=$(yq '.backend.sso // false' "$CONFIG")
        HAS_SSO="false"
        { [ "$FRONTEND_SSO" = "true" ] || [ "$BACKEND_SSO" = "true" ]; } && HAS_SSO="true"

        MIGRATE=$(yq '.migrate // ""' "$CONFIG")
        MIGRATE_COMMAND=""
        if [ "$MIGRATE" = "true" ]; then
          if [ "$HAS_DATABASE" != "true" ]; then
            echo "::error::migrate: true requires database to be configured"
            exit 1
          fi
          case "$BACKEND_LANG" in
            python)  MIGRATE_COMMAND="alembic upgrade head" ;;
            node)    MIGRATE_COMMAND="npx prisma migrate deploy" ;;
            go)      MIGRATE_COMMAND="atlas migrate apply --url \"\$DATABASE_URL\"" ;;
            *)       echo "::error::migrate: true but no default migration command for language '$BACKEND_LANG'. Use an explicit command string instead."; exit 1 ;;
          esac
        elif [ -n "$MIGRATE" ] && [ "$MIGRATE" != "null" ] && [ "$MIGRATE" != "false" ]; then
          MIGRATE_COMMAND="$MIGRATE"
        fi

        # Security (Guardian) — enabled by default
        # Note: yq's // operator treats false as falsy, so we read raw values
        # and only default to true when the field is absent (null)
        SECURITY_ENABLED=$(yq '.security.enabled' "$CONFIG")
        [ "$SECURITY_ENABLED" = "null" ] && SECURITY_ENABLED="true"
        SECURITY_SCAN_OSV=$(yq '.security.scan_osv' "$CONFIG")
        [ "$SECURITY_SCAN_OSV" = "null" ] && SECURITY_SCAN_OSV="true"
        SECURITY_SCAN_SECRETS=$(yq '.security.scan_secrets' "$CONFIG")
        [ "$SECURITY_SCAN_SECRETS" = "null" ] && SECURITY_SCAN_SECRETS="true"
        SECURITY_SCAN_SAST=$(yq '.security.scan_sast' "$CONFIG")
        [ "$SECURITY_SCAN_SAST" = "null" ] && SECURITY_SCAN_SAST="true"
        SECURITY_FAIL=$(yq '.security.fail_on_findings' "$CONFIG")
        [ "$SECURITY_FAIL" = "null" ] && SECURITY_FAIL="true"

        # MCP server
        MCP_LANG=$(yq '.mcp.language // "none"' "$CONFIG")
        MCP_DIR=$(yq '.mcp.dir // "mcp"' "$CONFIG")
        MCP_PORT=$(yq '.mcp.port // 8080' "$CONFIG")
        MCP_MEMORY=$(yq '.mcp.memory // "256Mi"' "$CONFIG")
        MCP_CPU=$(yq '.mcp.cpu // "1"' "$CONFIG")
        MCP_PUBLIC=$(yq '.mcp.public // false' "$CONFIG")
        # Machine consumers: SA emails allow-listed to call this MCP with
        # Google-signed ID tokens. Joined with ';' because the value rides
        # inside a comma-separated --set-env-vars flag downstream.
        MCP_SERVICE_ACCOUNTS=$(yq '(.mcp.allowed_service_accounts // []) | join(";")' "$CONFIG")
        HAS_MCP="false"
        [ "$MCP_LANG" != "none" ] && [ "$MCP_LANG" != "null" ] && HAS_MCP="true"
        # Auto-detect: if mcp block exists at all (any key set), treat as enabled with go default
        if [ "$HAS_MCP" = "false" ]; then
          MCP_BLOCK=$(yq '.mcp' "$CONFIG")
          if [ -n "$MCP_BLOCK" ] && [ "$MCP_BLOCK" != "null" ]; then
            HAS_MCP="true"
            MCP_LANG="go"
          fi
        fi

        # Kubernetes / Helm — apps that need a real cluster (dispatch k8s Jobs,
        # run a Helm chart) declare a `kubernetes:` block. Helm-installed into a
        # per-app namespace on the shared GKE cluster (see _kubernetes.yml).
        K8S_CHART=$(yq '.kubernetes.chart // ""' "$CONFIG")
        K8S_NAMESPACE=$(yq '.kubernetes.namespace // "'"$APP_NAME"'"' "$CONFIG")
        # No per-block domain: k8s apps use the top-level `domain:` (custom_domain
        # output) with the same .dev. derivation as Cloud Run — computed per-env
        # in _kubernetes.yml so there is one domain rule across all primitives.
        K8S_VALUES=$(yq -o=json -I=0 '.kubernetes.values // {}' "$CONFIG")
        K8S_IMAGES=$(yq -o=json -I=0 '[.kubernetes.images[]? | {"name": .name, "dockerfile": .dockerfile, "context": (.context // ".")}]' "$CONFIG")
        HAS_K8S="false"
        K8S_BLOCK=$(yq '.kubernetes' "$CONFIG")
        if [ -n "$K8S_BLOCK" ] && [ "$K8S_BLOCK" \!= "null" ]; then
          HAS_K8S="true"
          [ -z "$K8S_CHART" ] && K8S_CHART="deploy/helm/${APP_NAME}"
        fi

        # Quality (Pulse) — enabled by default
        QUALITY_ENABLED=$(yq '.quality.enabled' "$CONFIG")
        [ "$QUALITY_ENABLED" = "null" ] && QUALITY_ENABLED="true"
        QUALITY_MAX_CCN=$(yq '.quality.max_ccn // 15' "$CONFIG")
        QUALITY_MAX_COG=$(yq '.quality.max_cognitive // 20' "$CONFIG")
        QUALITY_MAX_DUP=$(yq '.quality.max_duplication // 5' "$CONFIG")
        QUALITY_MIN_MI=$(yq '.quality.min_maintainability // 40' "$CONFIG")
        QUALITY_FAIL=$(yq '.quality.fail_on_gate' "$CONFIG")
        [ "$QUALITY_FAIL" = "null" ] && QUALITY_FAIL="true"

        echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
        echo "has_frontend=$HAS_FRONTEND" >> $GITHUB_OUTPUT
        echo "frontend_framework=$FRONTEND_FRAMEWORK" >> $GITHUB_OUTPUT
        echo "frontend_dir=$FRONTEND_DIR" >> $GITHUB_OUTPUT
        echo "has_backend=$HAS_BACKEND" >> $GITHUB_OUTPUT
        echo "backend_language=$BACKEND_LANG" >> $GITHUB_OUTPUT
        echo "backend_dir=$BACKEND_DIR" >> $GITHUB_OUTPUT
        echo "backend_port=$BACKEND_PORT" >> $GITHUB_OUTPUT
        echo "min_instances=$MIN_INSTANCES" >> $GITHUB_OUTPUT
        echo "has_database=$HAS_DATABASE" >> $GITHUB_OUTPUT
        echo "provider=$PROVIDER" >> $GITHUB_OUTPUT
        echo "has_storage=$HAS_STORAGE" >> $GITHUB_OUTPUT
        echo "storage_type=$STORAGE_TYPE" >> $GITHUB_OUTPUT
        echo "storage_buckets=$STORAGE_BUCKETS" >> $GITHUB_OUTPUT
        echo "custom_domain=$CUSTOM_DOMAIN" >> $GITHUB_OUTPUT
        echo "has_sso=$HAS_SSO" >> $GITHUB_OUTPUT
        echo "migrate_command=$MIGRATE_COMMAND" >> $GITHUB_OUTPUT
        echo "security_enabled=$SECURITY_ENABLED" >> $GITHUB_OUTPUT
        echo "security_scan_osv=$SECURITY_SCAN_OSV" >> $GITHUB_OUTPUT
        echo "security_scan_secrets=$SECURITY_SCAN_SECRETS" >> $GITHUB_OUTPUT
        echo "security_scan_sast=$SECURITY_SCAN_SAST" >> $GITHUB_OUTPUT
        echo "security_fail_on_findings=$SECURITY_FAIL" >> $GITHUB_OUTPUT
        echo "quality_enabled=$QUALITY_ENABLED" >> $GITHUB_OUTPUT
        echo "quality_max_ccn=$QUALITY_MAX_CCN" >> $GITHUB_OUTPUT
        echo "quality_max_cognitive=$QUALITY_MAX_COG" >> $GITHUB_OUTPUT
        echo "quality_max_duplication=$QUALITY_MAX_DUP" >> $GITHUB_OUTPUT
        echo "quality_min_maintainability=$QUALITY_MIN_MI" >> $GITHUB_OUTPUT
        echo "quality_fail_on_gate=$QUALITY_FAIL" >> $GITHUB_OUTPUT
        echo "has_mcp=$HAS_MCP" >> $GITHUB_OUTPUT
        echo "mcp_language=$MCP_LANG" >> $GITHUB_OUTPUT
        echo "mcp_dir=$MCP_DIR" >> $GITHUB_OUTPUT
        echo "has_kubernetes=$HAS_K8S" >> $GITHUB_OUTPUT
        echo "kubernetes_chart=$K8S_CHART" >> $GITHUB_OUTPUT
        echo "kubernetes_namespace=$K8S_NAMESPACE" >> $GITHUB_OUTPUT
        echo "kubernetes_values=$K8S_VALUES" >> $GITHUB_OUTPUT
        echo "kubernetes_images=$K8S_IMAGES" >> $GITHUB_OUTPUT
        echo "mcp_port=$MCP_PORT" >> $GITHUB_OUTPUT
        echo "mcp_memory=$MCP_MEMORY" >> $GITHUB_OUTPUT
        echo "mcp_cpu=$MCP_CPU" >> $GITHUB_OUTPUT
        echo "mcp_public=$MCP_PUBLIC" >> $GITHUB_OUTPUT
        echo "mcp_service_accounts=$MCP_SERVICE_ACCOUNTS" >> $GITHUB_OUTPUT

        echo "App: $APP_NAME"
        echo "Frontend: $FRONTEND_FRAMEWORK ($FRONTEND_DIR)"
        echo "Backend: $BACKEND_LANG ($BACKEND_DIR:$BACKEND_PORT)"
        echo "Database: $DATABASE"
        echo "Storage: type=$STORAGE_TYPE buckets=$STORAGE_BUCKETS"
        echo "SSO: $HAS_SSO"
        echo "Migrate: ${MIGRATE_COMMAND:-none}"
        echo "Provider: $PROVIDER"
        echo "Security: $SECURITY_ENABLED (osv=$SECURITY_SCAN_OSV, secrets=$SECURITY_SCAN_SECRETS, sast=$SECURITY_SCAN_SAST)"
        echo "Quality: $QUALITY_ENABLED (ccn=$QUALITY_MAX_CCN, cognitive=$QUALITY_MAX_COG, dup=${QUALITY_MAX_DUP}%, mi=$QUALITY_MIN_MI)"
