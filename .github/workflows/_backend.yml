name: "Deploy Backend (GCP)"

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      backend_dir:
        type: string
        required: true
        default: backend
      backend_language:
        type: string
        required: true
        default: python
      backend_port:
        type: number
        required: true
        default: 8080
      environment:
        type: string
        required: true
      platform_project:
        type: string
        required: true
      region:
        type: string
        required: true
        default: europe-west1
      wif_provider:
        type: string
        required: true
      service_account:
        type: string
        required: true
      memory:
        type: string
        required: false
        default: "512Mi"
      cpu:
        type: string
        required: false
        default: "1"
      frontend_url:
        type: string
        required: false
        default: ""
    outputs:
      url:
        description: "Deployed backend URL"
        value: ${{ jobs.deploy.outputs.url }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Cloud Run
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout StackRamp platform
        uses: actions/checkout@v4
        with:
          repository: bobbydeveaux/stackramp
          path: .stackramp

      - name: Authenticate to Google Cloud
        uses: bobbydeveaux/stackramp/providers/gcp/workflows/auth@main
        with:
          wif_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.platform_project }}/stackramp-images/${{ inputs.app_name }}:${{ github.sha }}"

          if [ -f "${{ inputs.backend_dir }}/Dockerfile" ]; then
            echo "Using custom Dockerfile from ${{ inputs.backend_dir }}/Dockerfile"
            docker build -t "$IMAGE" ${{ inputs.backend_dir }}/
          else
            echo "Using platform Dockerfile for ${{ inputs.backend_language }}"
            docker build \
              -t "$IMAGE" \
              -f .stackramp/platform-action/dockerfiles/${{ inputs.backend_language }}.Dockerfile \
              ${{ inputs.backend_dir }}/
          fi

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-${{ inputs.environment }}"

          gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE" \
            --region=${{ inputs.region }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=${{ inputs.backend_port }} \
            --set-env-vars="ENVIRONMENT=${{ inputs.environment }},APP_NAME=${{ inputs.app_name }},FRONTEND_URL=${{ inputs.frontend_url }}" \
            --memory=${{ inputs.memory }} \
            --cpu=${{ inputs.cpu }} \
            --max-instances=10 \
            --timeout=300 \
            --cpu-throttling \
            --project=${{ inputs.platform_project }}

      - name: Get deployed URL
        id: url
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-${{ inputs.environment }}"
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region=${{ inputs.region }} \
            --project=${{ inputs.platform_project }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "🚀 Backend deployed: $URL"
