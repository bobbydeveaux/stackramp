name: "Deploy Backend (GCP)"

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      backend_dir:
        type: string
        required: true
        default: backend
      backend_language:
        type: string
        required: true
        default: python
      backend_port:
        type: number
        required: true
        default: 8080
      environment:
        type: string
        required: true
      platform_project:
        type: string
        required: true
      region:
        type: string
        required: true
        default: europe-west1
      wif_provider:
        type: string
        required: true
      service_account:
        type: string
        required: true
      memory:
        type: string
        required: false
        default: "512Mi"
      cpu:
        type: string
        required: false
        default: "1"
      frontend_url:
        type: string
        required: false
        default: ""
      storage_bucket:
        type: string
        required: false
        default: ""
      extra_env_vars:
        type: string
        required: false
        default: ""
        description: "Additional comma-separated KEY=VALUE env vars to inject into Cloud Run (non-secret config only)."
      cloudsql_connection_name:
        type: string
        required: false
        default: ""
        description: "Cloud SQL instance connection name (project:region:instance). Required when the app has a database."
      database_secret_name:
        type: string
        required: false
        default: ""
        description: "Secret Manager secret ID holding DATABASE_URL for this app. Mounted directly into Cloud Run."
    outputs:
      url:
        description: "Deployed backend URL"
        value: ${{ jobs.deploy.outputs.url }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Cloud Run
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout StackRamp platform
        uses: actions/checkout@v4
        with:
          repository: bobbydeveaux/stackramp
          path: .stackramp

      - name: Authenticate to Google Cloud
        uses: bobbydeveaux/stackramp/providers/gcp/workflows/auth@main
        with:
          wif_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.platform_project }}/stackramp-images/${{ inputs.app_name }}:${{ github.sha }}"

          if [ -f "${{ inputs.backend_dir }}/Dockerfile" ]; then
            echo "Using custom Dockerfile from ${{ inputs.backend_dir }}/Dockerfile"
            docker build -t "$IMAGE" ${{ inputs.backend_dir }}/
          else
            echo "Using platform Dockerfile for ${{ inputs.backend_language }}"
            docker build \
              -t "$IMAGE" \
              -f .stackramp/platform-action/dockerfiles/${{ inputs.backend_language }}.Dockerfile \
              ${{ inputs.backend_dir }}/
          fi

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-${{ inputs.environment }}"

          # ── Env vars (non-secret config) ────────────────────────────────────
          ENV_VARS="ENVIRONMENT=${{ inputs.environment }},APP_NAME=${{ inputs.app_name }},FRONTEND_URL=${{ inputs.frontend_url }}"
          if [ -n "${{ inputs.storage_bucket }}" ]; then
            ENV_VARS="${ENV_VARS},GCS_BUCKET=${{ inputs.storage_bucket }}"
          fi
          if [ -n "${{ inputs.extra_env_vars }}" ]; then
            ENV_VARS="${ENV_VARS},${{ inputs.extra_env_vars }}"
          fi

          # ── Secret refs (mounted by Cloud Run directly from Secret Manager) ─
          # Platform-wide secrets: any secret labelled platform-inject=true is
          # automatically discovered and mounted — no workflow changes needed
          # when the platform team adds a new secret via bootstrap terraform.
          SECRET_REFS=""
          PLATFORM_SECRETS=$(gcloud secrets list \
            --filter="labels.platform-inject=true" \
            --format="value(name)" \
            --project="${{ inputs.platform_project }}")
          for SECRET_RESOURCE in $PLATFORM_SECRETS; do
            SECRET_NAME=$(basename "$SECRET_RESOURCE")
            SECRET_REFS="${SECRET_REFS:+$SECRET_REFS,}${SECRET_NAME}=${SECRET_NAME}:latest"
          done

          # App-specific database secret (generated by platform terraform)
          if [ -n "${{ inputs.database_secret_name }}" ]; then
            SECRET_REFS="${SECRET_REFS:+$SECRET_REFS,}DATABASE_URL=${{ inputs.database_secret_name }}:latest"
          fi

          # ── Build deploy flags ───────────────────────────────────────────────
          DEPLOY_FLAGS=(
            --image="$IMAGE"
            --region="${{ inputs.region }}"
            --platform=managed
            --allow-unauthenticated
            --port="${{ inputs.backend_port }}"
            --set-env-vars="${ENV_VARS}"
            --memory="${{ inputs.memory }}"
            --cpu="${{ inputs.cpu }}"
            --min-instances=1
            --max-instances=10
            --timeout=300
            --cpu-throttling
            --project="${{ inputs.platform_project }}"
          )
          [ -n "$SECRET_REFS" ] && DEPLOY_FLAGS+=(--set-secrets="$SECRET_REFS")
          [ -n "${{ inputs.cloudsql_connection_name }}" ] && DEPLOY_FLAGS+=(--add-cloudsql-instances="${{ inputs.cloudsql_connection_name }}")

          gcloud run deploy "$SERVICE_NAME" "${DEPLOY_FLAGS[@]}"

      - name: Get deployed URL
        id: url
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-${{ inputs.environment }}"
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region=${{ inputs.region }} \
            --project=${{ inputs.platform_project }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "🚀 Backend deployed: $URL"

