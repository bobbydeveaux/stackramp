name: "Deploy MCP Server (GCP)"

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      name:
        type: string
        required: false
        default: "mcp"
        description: "Service-name suffix — deploys as {app}-{name}-{env}. Defaults to 'mcp' (unchanged for the legacy mcp: block); v2 machine backends pass their own name (e.g. 'ingest')."
      service_accounts:
        type: string
        required: false
        default: ""
        description: "Semicolon-joined SA emails allow-listed to call this service with Google-signed ID tokens. Injected as BOTH STACKRAMP_SERVICE_ACCOUNTS and (for posterity) MCP_SERVICE_ACCOUNTS."
      mcp_dir:
        type: string
        required: true
        default: mcp
      mcp_language:
        type: string
        required: true
        default: go
      mcp_port:
        type: number
        required: true
        default: 8080
      environment:
        type: string
        required: true
      platform_project:
        type: string
        required: true
      region:
        type: string
        required: false
        default: europe-west1
      wif_provider:
        type: string
        required: true
      service_account:
        type: string
        required: true
      memory:
        type: string
        required: false
        default: "256Mi"
      cpu:
        type: string
        required: false
        default: "1"
      frontend_url:
        type: string
        required: false
        default: ""
      backend_url:
        type: string
        required: false
        default: ""
      iap_allowed_domain:
        type: string
        required: false
        default: ""
        description: "Google Workspace domain for the run.invoker IAM binding (e.g. toucanberry.com). Sourced from STACKRAMP_IAP_DOMAIN."
      vpc_connector:
        type: string
        required: false
        default: ""
        description: "Serverless VPC Access Connector. Required to reach an ingress=internal backend — egress is set to all-traffic so backend calls originate inside the VPC (same as the SSO frontend proxy)."
      public:
        type: string
        required: false
        default: "false"
        description: "When true, deploy --allow-unauthenticated (allUsers) so MCP OAuth discovery works for clients like Claude Code. Requires an org policy permitting allUsers; auth is enforced in-app."
      extra_env_vars:
        type: string
        required: false
        default: ""
        description: "Additional comma-separated KEY=VALUE env vars to inject into Cloud Run."
    outputs:
      url:
        description: "Deployed MCP server URL"
        value: ${{ jobs.deploy.outputs.url }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Cloud Run (MCP)
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout StackRamp platform
        uses: actions/checkout@v4
        with:
          repository: bobbydeveaux/stackramp
          ref: main
          path: .stackramp

      - name: Authenticate to Google Cloud
        uses: bobbydeveaux/stackramp/providers/gcp/workflows/auth@main
        with:
          wif_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.platform_project }}/stackramp-images/${{ inputs.app_name }}-mcp:${{ github.sha }}"

          if [ -f "${{ inputs.mcp_dir }}/Dockerfile" ]; then
            echo "Using custom Dockerfile from ${{ inputs.mcp_dir }}/Dockerfile"
            docker build -t "$IMAGE" ${{ inputs.mcp_dir }}/
          else
            echo "Using platform Dockerfile for ${{ inputs.mcp_language }}"
            docker build \
              -t "$IMAGE" \
              -f .stackramp/platform-action/dockerfiles/${{ inputs.mcp_language }}.Dockerfile \
              ${{ inputs.mcp_dir }}/
          fi

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-${{ inputs.name }}-${{ inputs.environment }}"

          ENV_VARS="ENVIRONMENT=${{ inputs.environment }},APP_NAME=${{ inputs.app_name }}"
          [ -n "${{ inputs.frontend_url }}" ] && ENV_VARS="${ENV_VARS},FRONTEND_URL=${{ inputs.frontend_url }}"
          [ -n "${{ inputs.backend_url }}" ]  && ENV_VARS="${ENV_VARS},BACKEND_URL=${{ inputs.backend_url }}"
          [ -n "${{ inputs.extra_env_vars }}" ] && ENV_VARS="${ENV_VARS},${{ inputs.extra_env_vars }}"
          # Machine allow-list: inject under the v2 name AND the legacy name.
          if [ -n "${{ inputs.service_accounts }}" ]; then
            ENV_VARS="${ENV_VARS},STACKRAMP_SERVICE_ACCOUNTS=${{ inputs.service_accounts }},MCP_SERVICE_ACCOUNTS=${{ inputs.service_accounts }}"
          fi

          SECRET_REFS=""
          PLATFORM_SECRETS=$(gcloud secrets list \
            --filter="labels.platform-inject=true" \
            --format="value(name)" \
            --project="${{ inputs.platform_project }}")
          for SECRET_RESOURCE in $PLATFORM_SECRETS; do
            SECRET_NAME=$(basename "$SECRET_RESOURCE")
            SECRET_REFS="${SECRET_REFS:+$SECRET_REFS,}${SECRET_NAME}=${SECRET_NAME}:latest"
          done

          DEPLOY_FLAGS=(
            --image="$IMAGE"
            --region="${{ inputs.region }}"
            --platform=managed
            --port="${{ inputs.mcp_port }}"
            --set-env-vars="${ENV_VARS}"
            --memory="${{ inputs.memory }}"
            --cpu="${{ inputs.cpu }}"
            --min-instances=0
            --max-instances=10
            --timeout=300
            --cpu-throttling
            --project="${{ inputs.platform_project }}"
            --ingress=all
          )
          if [ "${{ inputs.public }}" = "true" ]; then
            # Public MCP: reachable client->server by external OAuth clients
            # (Claude, claude.ai, Inspector); auth is enforced in-app via OAuth.
            # Use --no-invoker-iam-check, NOT --allow-unauthenticated: the latter
            # adds an allUsers IAM binding that the DomainRestrictedSharing org
            # policy rejects. Disabling the invoker IAM check makes the endpoint
            # reachable without any public IAM grant, so the org policy is
            # untouched and the MCP server's own OAuth gates access.
            DEPLOY_FLAGS+=(--no-invoker-iam-check)
          else
            DEPLOY_FLAGS+=(--no-allow-unauthenticated)
          fi
          [ -n "$SECRET_REFS" ] && DEPLOY_FLAGS+=(--set-secrets="$SECRET_REFS")
          [ -n "${{ inputs.vpc_connector }}" ] && DEPLOY_FLAGS+=(--vpc-connector="${{ inputs.vpc_connector }}" --vpc-egress=all-traffic)

          gcloud run deploy "$SERVICE_NAME" "${DEPLOY_FLAGS[@]}"

      - name: Grant domain invoker on MCP service
        if: inputs.iap_allowed_domain != '' && inputs.public != 'true'
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-${{ inputs.name }}-${{ inputs.environment }}"
          IFS=',' read -ra DOMAINS <<< "${{ inputs.iap_allowed_domain }}"
          for DOMAIN in "${DOMAINS[@]}"; do
            DOMAIN=$(echo "$DOMAIN" | xargs)
            [ -z "$DOMAIN" ] && continue
            gcloud run services add-iam-policy-binding "$SERVICE_NAME" \
              --region="${{ inputs.region }}" \
              --project="${{ inputs.platform_project }}" \
              --member="domain:${DOMAIN}" \
              --role="roles/run.invoker" \
              --quiet
          done

      - name: Get deployed URL
        id: url
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-${{ inputs.name }}-${{ inputs.environment }}"
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region=${{ inputs.region }} \
            --project=${{ inputs.platform_project }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "MCP server deployed: $URL"
