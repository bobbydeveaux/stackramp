name: "Deploy MCP Server (GCP)"

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      mcp_dir:
        type: string
        required: true
        default: mcp
      mcp_language:
        type: string
        required: true
        default: go
      mcp_port:
        type: number
        required: true
        default: 8080
      environment:
        type: string
        required: true
      platform_project:
        type: string
        required: true
      region:
        type: string
        required: false
        default: europe-west1
      wif_provider:
        type: string
        required: true
      service_account:
        type: string
        required: true
      memory:
        type: string
        required: false
        default: "256Mi"
      cpu:
        type: string
        required: false
        default: "1"
      frontend_url:
        type: string
        required: false
        default: ""
      backend_url:
        type: string
        required: false
        default: ""
      iap_allowed_domain:
        type: string
        required: false
        default: ""
        description: "Google Workspace domain for the run.invoker IAM binding (e.g. toucanberry.com). Sourced from STACKRAMP_IAP_DOMAIN."
      extra_env_vars:
        type: string
        required: false
        default: ""
        description: "Additional comma-separated KEY=VALUE env vars to inject into Cloud Run."
    outputs:
      url:
        description: "Deployed MCP server URL"
        value: ${{ jobs.deploy.outputs.url }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Cloud Run (MCP)
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout StackRamp platform
        uses: actions/checkout@v4
        with:
          repository: bobbydeveaux/stackramp
          ref: main
          path: .stackramp

      - name: Authenticate to Google Cloud
        uses: bobbydeveaux/stackramp/providers/gcp/workflows/auth@main
        with:
          wif_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.platform_project }}/stackramp-images/${{ inputs.app_name }}-mcp:${{ github.sha }}"

          if [ -f "${{ inputs.mcp_dir }}/Dockerfile" ]; then
            echo "Using custom Dockerfile from ${{ inputs.mcp_dir }}/Dockerfile"
            docker build -t "$IMAGE" ${{ inputs.mcp_dir }}/
          else
            echo "Using platform Dockerfile for ${{ inputs.mcp_language }}"
            docker build \
              -t "$IMAGE" \
              -f .stackramp/platform-action/dockerfiles/${{ inputs.mcp_language }}.Dockerfile \
              ${{ inputs.mcp_dir }}/
          fi

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-mcp-${{ inputs.environment }}"

          ENV_VARS="ENVIRONMENT=${{ inputs.environment }},APP_NAME=${{ inputs.app_name }}"
          [ -n "${{ inputs.frontend_url }}" ] && ENV_VARS="${ENV_VARS},FRONTEND_URL=${{ inputs.frontend_url }}"
          [ -n "${{ inputs.backend_url }}" ]  && ENV_VARS="${ENV_VARS},BACKEND_URL=${{ inputs.backend_url }}"
          [ -n "${{ inputs.extra_env_vars }}" ] && ENV_VARS="${ENV_VARS},${{ inputs.extra_env_vars }}"

          SECRET_REFS=""
          PLATFORM_SECRETS=$(gcloud secrets list \
            --filter="labels.platform-inject=true" \
            --format="value(name)" \
            --project="${{ inputs.platform_project }}")
          for SECRET_RESOURCE in $PLATFORM_SECRETS; do
            SECRET_NAME=$(basename "$SECRET_RESOURCE")
            SECRET_REFS="${SECRET_REFS:+$SECRET_REFS,}${SECRET_NAME}=${SECRET_NAME}:latest"
          done

          DEPLOY_FLAGS=(
            --image="$IMAGE"
            --region="${{ inputs.region }}"
            --platform=managed
            --port="${{ inputs.mcp_port }}"
            --set-env-vars="${ENV_VARS}"
            --memory="${{ inputs.memory }}"
            --cpu="${{ inputs.cpu }}"
            --min-instances=0
            --max-instances=10
            --timeout=300
            --cpu-throttling
            --project="${{ inputs.platform_project }}"
            --no-allow-unauthenticated
            --ingress=all
          )
          [ -n "$SECRET_REFS" ] && DEPLOY_FLAGS+=(--set-secrets="$SECRET_REFS")

          gcloud run deploy "$SERVICE_NAME" "${DEPLOY_FLAGS[@]}"

      - name: Grant domain invoker on MCP service
        if: inputs.iap_allowed_domain != ''
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-mcp-${{ inputs.environment }}"
          IFS=',' read -ra DOMAINS <<< "${{ inputs.iap_allowed_domain }}"
          for DOMAIN in "${DOMAINS[@]}"; do
            DOMAIN=$(echo "$DOMAIN" | xargs)
            [ -z "$DOMAIN" ] && continue
            gcloud run services add-iam-policy-binding "$SERVICE_NAME" \
              --region="${{ inputs.region }}" \
              --project="${{ inputs.platform_project }}" \
              --member="domain:${DOMAIN}" \
              --role="roles/run.invoker" \
              --quiet
          done

      - name: Get deployed URL
        id: url
        run: |
          SERVICE_NAME="${{ inputs.app_name }}-mcp-${{ inputs.environment }}"
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region=${{ inputs.region }} \
            --project=${{ inputs.platform_project }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "MCP server deployed: $URL"
