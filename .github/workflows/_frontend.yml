name: "Deploy Frontend (GCP)"

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      frontend_dir:
        type: string
        required: true
        default: frontend
      frontend_framework:
        type: string
        required: true
        default: react
      environment:
        type: string
        required: true
      platform_project:
        type: string
        required: true
      region:
        type: string
        required: true
        default: europe-west1
      wif_provider:
        type: string
        required: true
      service_account:
        type: string
        required: true
      is_pr:
        type: string
        required: false
        default: "false"
      backend_url:
        type: string
        required: false
        default: ""
      has_backend:
        type: string
        required: false
        default: "false"
      site_id:
        type: string
        required: false
        default: ""
      sso:
        type: string
        required: false
        default: "false"
        description: "When true, build a Docker image and deploy to Cloud Run instead of Firebase Hosting."
      custom_domain:
        type: string
        required: false
        default: ""
        description: "Custom domain for the app — used as the output URL when sso=true."
      vpc_connector:
        type: string
        required: false
        default: ""
        description: "VPC connector name — when set, frontend routes all traffic through VPC for internal backend access."
      frontend_sa:
        type: string
        required: false
        default: ""
        description: "Custom service account for SSO frontend Cloud Run (for orgs that restrict default compute SA)."
    outputs:
      url:
        description: "Deployed frontend URL"
        value: ${{ jobs.deploy.outputs.url }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: ${{ inputs.sso == 'true' && 'Cloud Run (SSO)' || 'Firebase Hosting' }}
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url || steps.deploy-preview.outputs.url || steps.deploy-sso.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout StackRamp platform
        if: inputs.sso == 'true'
        uses: actions/checkout@v4
        with:
          repository: bobbydeveaux/stackramp
          ref: main
          path: .stackramp

      - name: Authenticate to Google Cloud
        uses: bobbydeveaux/stackramp/providers/gcp/workflows/auth@main
        with:
          wif_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Detect Node version and package manager
        if: inputs.frontend_framework != 'static'
        id: node-version
        run: |
          if [ -f "${{ inputs.frontend_dir }}/.nvmrc" ]; then
            echo "version=$(cat ${{ inputs.frontend_dir }}/.nvmrc)" >> $GITHUB_OUTPUT
          else
            echo "version=20" >> $GITHUB_OUTPUT
          fi

          if [ -f "${{ inputs.frontend_dir }}/pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
          elif [ -f "${{ inputs.frontend_dir }}/yarn.lock" ]; then
            echo "pm=yarn" >> $GITHUB_OUTPUT
          else
            echo "pm=npm" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: inputs.frontend_framework != 'static' && steps.node-version.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: inputs.frontend_framework != 'static'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: ${{ steps.node-version.outputs.pm }}
          cache-dependency-path: |
            ${{ steps.node-version.outputs.pm == 'pnpm' && format('{0}/pnpm-lock.yaml', inputs.frontend_dir) || '' }}
            ${{ steps.node-version.outputs.pm == 'yarn' && format('{0}/yarn.lock', inputs.frontend_dir) || '' }}
            ${{ steps.node-version.outputs.pm == 'npm' && format('{0}/package-lock.json', inputs.frontend_dir) || '' }}

      - name: Install & Build
        if: inputs.frontend_framework != 'static'
        env:
          VITE_API_URL: ${{ inputs.backend_url }}
        run: |
          cd ${{ inputs.frontend_dir }}
          mkdir -p public
          if [ "${{ steps.node-version.outputs.pm }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
            pnpm run build
          elif [ "${{ steps.node-version.outputs.pm }}" = "yarn" ]; then
            yarn install --frozen-lockfile
            yarn build
          else
            npm ci
            npm run build
          fi

      - name: Copy static files to dist
        if: inputs.frontend_framework == 'static'
        run: |
          mkdir -p ${{ inputs.frontend_dir }}/dist
          cp -r ${{ inputs.frontend_dir }}/* ${{ inputs.frontend_dir }}/dist/ 2>/dev/null || true
          rm -rf ${{ inputs.frontend_dir }}/dist/dist

      # ── SSO path: Docker + Cloud Run ──────────────────────────────────────
      - name: Configure Docker (SSO)
        if: inputs.sso == 'true' && inputs.is_pr != 'true'
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev

      - name: Build & push Docker image (SSO)
        if: inputs.sso == 'true' && inputs.is_pr != 'true'
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.platform_project }}/stackramp-images/${{ inputs.app_name }}-fe:${{ github.sha }}"
          if [ "${{ inputs.frontend_framework }}" = "next" ]; then
            DOCKERFILE=".stackramp/platform-action/dockerfiles/node-next.Dockerfile"
          elif [ "${{ inputs.has_backend }}" = "true" ]; then
            # Go proxy for all SSO apps with backends — handles identity tokens for
            # service-to-service auth. Works on both permissive and restrictive orgs.
            DOCKERFILE=".stackramp/platform-action/dockerfiles/go-spa-proxy.Dockerfile"
          else
            DOCKERFILE=".stackramp/platform-action/dockerfiles/nginx-spa.Dockerfile"
          fi

          # Go proxy needs repo root as context (for .stackramp/); nginx/next use frontend dir
          if [ "$DOCKERFILE" = ".stackramp/platform-action/dockerfiles/go-spa-proxy.Dockerfile" ]; then
            # Copy dist into repo root so Dockerfile can access both dist/ and .stackramp/
            cp -r ${{ inputs.frontend_dir }}/dist ./dist
            docker build -t "$IMAGE" -f "$DOCKERFILE" .
            rm -rf ./dist
          else
            docker build \
              -t "$IMAGE" \
              -f "$DOCKERFILE" \
              --build-arg BACKEND_URL="${{ inputs.backend_url }}" \
              ${{ inputs.frontend_dir }}/
          fi
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (SSO)
        if: inputs.sso == 'true' && inputs.is_pr != 'true'
        id: deploy-sso
        run: |
          FRONTEND_PORT=${{ inputs.frontend_framework == 'next' && '3000' || '8080' }}

          # ── Secret refs (mounted by Cloud Run directly from Secret Manager) ─
          SECRET_REFS=""
          PLATFORM_SECRETS=$(gcloud secrets list \
            --filter="labels.platform-inject=true" \
            --format="value(name)" \
            --project="${{ inputs.platform_project }}")
          for SECRET_RESOURCE in $PLATFORM_SECRETS; do
            SECRET_NAME=$(basename "$SECRET_RESOURCE")
            SECRET_REFS="${SECRET_REFS:+$SECRET_REFS,}${SECRET_NAME}=${SECRET_NAME}:latest"
          done

          DEPLOY_FLAGS=(
            --image="$IMAGE"
            --region="${{ inputs.region }}"
            --platform=managed
            --port=$FRONTEND_PORT
            --no-allow-unauthenticated
            --ingress=all
            --project="${{ inputs.platform_project }}"
          )
          [ -n "$SECRET_REFS" ] && DEPLOY_FLAGS+=(--set-secrets="$SECRET_REFS")
          [ -n "${{ inputs.frontend_sa }}" ] && DEPLOY_FLAGS+=(--service-account="${{ inputs.frontend_sa }}")
          # Go proxy reads BACKEND_URL at runtime for /api/* proxying
          [ -n "${{ inputs.backend_url }}" ] && DEPLOY_FLAGS+=(--set-env-vars="BACKEND_URL=${{ inputs.backend_url }}")
          if [ -n "${{ inputs.vpc_connector }}" ]; then
            DEPLOY_FLAGS+=(--vpc-connector="${{ inputs.vpc_connector }}" --vpc-egress=private-ranges-only)
          fi

          gcloud run deploy "${{ inputs.app_name }}-fe-${{ inputs.environment }}" "${DEPLOY_FLAGS[@]}"

          URL="${{ inputs.custom_domain != '' && format('https://{0}', inputs.custom_domain) || '' }}"
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Firebase Hosting path (non-SSO) ───────────────────────────────────
      - name: Install Firebase Tools
        if: inputs.sso != 'true'
        run: npm install -g firebase-tools

      - name: Create firebase.json
        if: inputs.sso != 'true'
        run: |
          SITE_NAME="${{ inputs.site_id != '' && inputs.site_id || format('{0}-{1}', inputs.app_name, inputs.environment) }}"
          CLOUD_RUN_SERVICE="${{ inputs.app_name }}-${{ inputs.environment }}"
          if [ "${{ inputs.has_backend }}" = "true" ]; then
            if [ "${{ inputs.frontend_framework }}" = "static" ]; then
              cat > firebase.json << EOF
          {
            "hosting": {
              "site": "${SITE_NAME}",
              "public": "${{ inputs.frontend_dir }}/dist",
              "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
              "rewrites": [
                {
                  "source": "/api/**",
                  "run": {
                    "serviceId": "${CLOUD_RUN_SERVICE}",
                    "region": "${{ inputs.region }}"
                  }
                }
              ]
            }
          }
          EOF
            else
              cat > firebase.json << EOF
          {
            "hosting": {
              "site": "${SITE_NAME}",
              "public": "${{ inputs.frontend_dir }}/dist",
              "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
              "rewrites": [
                {
                  "source": "/api/**",
                  "run": {
                    "serviceId": "${CLOUD_RUN_SERVICE}",
                    "region": "${{ inputs.region }}"
                  }
                },
                {
                  "source": "**",
                  "destination": "/index.html"
                }
              ]
            }
          }
          EOF
            fi
          else
            if [ "${{ inputs.frontend_framework }}" = "static" ]; then
              cat > firebase.json << EOF
          {
            "hosting": {
              "site": "${SITE_NAME}",
              "public": "${{ inputs.frontend_dir }}/dist",
              "ignore": ["firebase.json", "**/.*", "**/node_modules/**"]
            }
          }
          EOF
            else
              cat > firebase.json << EOF
          {
            "hosting": {
              "site": "${SITE_NAME}",
              "public": "${{ inputs.frontend_dir }}/dist",
              "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
              "rewrites": [
                {
                  "source": "**",
                  "destination": "/index.html"
                }
              ]
            }
          }
          EOF
            fi
          fi

      - name: Deploy to live channel
        if: inputs.sso != 'true' && inputs.is_pr != 'true'
        id: deploy
        run: |
          firebase deploy --only hosting \
            --project ${{ inputs.platform_project }} \
            --non-interactive 2>&1 | tee /tmp/firebase-out.txt
          URL=$(grep -o 'https://[^ ]*\.web\.app' /tmp/firebase-out.txt | head -1)
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Deploy to preview channel
        if: inputs.sso != 'true' && inputs.is_pr == 'true'
        id: deploy-preview
        run: |
          SITE_ID="${{ inputs.site_id != '' && inputs.site_id || format('{0}-dev', inputs.app_name) }}"
          firebase hosting:channel:deploy pr-${{ github.event.pull_request.number }} \
            --only "$SITE_ID" \
            --project ${{ inputs.platform_project }} \
            --non-interactive 2>&1 | tee /tmp/firebase-out.txt
          # Channel URL line contains the preview-specific URL (with --pr-N- in it)
          URL=$(grep "Channel URL" /tmp/firebase-out.txt | grep -oE 'https://[^ ]*\.web\.app' | head -1)
          if [ -z "$URL" ]; then
            URL=$(grep -oE 'https://[^ ]*\.web\.app' /tmp/firebase-out.txt | head -1)
          fi
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Preview URL: ${URL}"

      - name: Comment preview URL on PR
        if: inputs.sso != 'true' && inputs.is_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy-preview.outputs.url }}';
            const link = url ? `\n\n🔗 ${url}` : '';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **${{ inputs.app_name }}** frontend preview deployed!${link}`
            });
