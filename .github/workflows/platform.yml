name: StackRamp Platform Deploy

# This is the ONLY workflow file that consuming repos reference.
# Usage in your repo's .github/workflows/deploy.yml:
#
#   jobs:
#     deploy:
#       permissions:
#         id-token: write       # required for WIF / GCP auth
#         contents: read        # required to checkout code
#         pull-requests: write  # required to post PR preview URLs
#       uses: bobbydeveaux/stackramp/.github/workflows/platform.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to stackramp.yaml (default: stackramp.yaml)"
        type: string
        required: false
        default: "stackramp.yaml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Parse stackramp.yaml and detect what changed
  # ─────────────────────────────────────────────────────────────────────────────
  parse-config:
    name: Parse stackramp.yaml
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.config.outputs.app_name }}
      has_frontend: ${{ steps.config.outputs.has_frontend }}
      has_backend: ${{ steps.config.outputs.has_backend }}
      frontend_dir: ${{ steps.config.outputs.frontend_dir }}
      frontend_framework: ${{ steps.config.outputs.frontend_framework }}
      backend_dir: ${{ steps.config.outputs.backend_dir }}
      backend_language: ${{ steps.config.outputs.backend_language }}
      backend_port: ${{ steps.config.outputs.backend_port }}
      has_database: ${{ steps.config.outputs.has_database }}
      provider: ${{ steps.config.outputs.provider }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      backend_changed: ${{ steps.changes.outputs.backend }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      custom_domain: ${{ steps.config.outputs.custom_domain }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse config
        id: config
        uses: bobbydeveaux/stackramp/platform-action@main
        with:
          config_path: ${{ inputs.config_path }}

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - '${{ steps.config.outputs.frontend_dir }}/**'
              - '${{ inputs.config_path }}'
            backend:
              - '${{ steps.config.outputs.backend_dir }}/**'
              - '${{ inputs.config_path }}'

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Provision app infrastructure (idempotent)
  # ─────────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    needs: [parse-config]
    outputs:
      backend_url_dev: ${{ steps.tf-out-dev.outputs.backend_url }}
      backend_url_prod: ${{ steps.tf-out-prod.outputs.backend_url }}
      frontend_url_dev: ${{ steps.tf-out-dev.outputs.frontend_url }}
      frontend_url_prod: ${{ steps.tf-out-prod.outputs.frontend_url }}
      site_id_dev: ${{ steps.tf-out-dev.outputs.site_id }}
      site_id_prod: ${{ steps.tf-out-prod.outputs.site_id }}
    steps:
      - name: Checkout StackRamp platform
        uses: actions/checkout@v4
        with:
          repository: bobbydeveaux/stackramp
          path: .stackramp

      - name: Authenticate to Google Cloud
        uses: bobbydeveaux/stackramp/providers/gcp/workflows/auth@main
        with:
          wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
          service_account: ${{ vars.STACKRAMP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.STACKRAMP_PROJECT }}-tf-state" \
            -backend-config="prefix=${{ needs.parse-config.outputs.app_name }}-dev"

      - name: Terraform apply (dev)
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          # For auto-generated subdomains (app.base_domain), dev gets app.dev.base_domain.
          # Explicit domains (e.g. stackramp.io set directly in stackramp.yaml) are left as-is.
          CUSTOM_DOMAIN="${{ needs.parse-config.outputs.custom_domain }}"
          BASE_DOMAIN="${{ vars.STACKRAMP_BASE_DOMAIN }}"
          APP="${{ needs.parse-config.outputs.app_name }}"
          if [ -n "$CUSTOM_DOMAIN" ] && [ -n "$BASE_DOMAIN" ] && [ "$CUSTOM_DOMAIN" = "${APP}.${BASE_DOMAIN}" ]; then
            CUSTOM_DOMAIN="${APP}.dev.${BASE_DOMAIN}"
          fi
          BACKEND_DOMAIN=""
          [ -n "$CUSTOM_DOMAIN" ] && [ "${{ needs.parse-config.outputs.has_backend }}" = "true" ] && BACKEND_DOMAIN="api.${CUSTOM_DOMAIN}"

          TF_VARS="-var=app_name=${{ needs.parse-config.outputs.app_name }} \
            -var=environment=dev \
            -var=platform_project=${{ vars.STACKRAMP_PROJECT }} \
            -var=region=${{ vars.STACKRAMP_REGION }} \
            -var=custom_domain=${CUSTOM_DOMAIN} \
            -var=backend_domain=${BACKEND_DOMAIN} \
            -var=dns_zone_name=${{ vars.STACKRAMP_DNS_ZONE || '' }}"

          # Step 1: create Firebase custom domain first so required_dns_updates is populated
          if [ -n "$CUSTOM_DOMAIN" ]; then
            terraform apply -auto-approve -target=google_firebase_hosting_custom_domain.app $TF_VARS
          fi
          # Step 2: full apply — TXT records can now be created with known rrdatas
          terraform apply -auto-approve $TF_VARS

      - name: Capture dev outputs
        id: tf-out-dev
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          echo "backend_url=$(terraform output -raw backend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "site_id=$(terraform output -raw site_id 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Terraform init (prod)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.STACKRAMP_PROJECT }}-tf-state" \
            -backend-config="prefix=${{ needs.parse-config.outputs.app_name }}-prod"

      - name: Terraform apply (prod — main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          CUSTOM_DOMAIN="${{ needs.parse-config.outputs.custom_domain }}"
          BACKEND_DOMAIN=""
          [ -n "$CUSTOM_DOMAIN" ] && [ "${{ needs.parse-config.outputs.has_backend }}" = "true" ] && BACKEND_DOMAIN="api.${CUSTOM_DOMAIN}"

          TF_VARS="-var=app_name=${{ needs.parse-config.outputs.app_name }} \
            -var=environment=prod \
            -var=platform_project=${{ vars.STACKRAMP_PROJECT }} \
            -var=region=${{ vars.STACKRAMP_REGION }} \
            -var=custom_domain=${CUSTOM_DOMAIN} \
            -var=backend_domain=${BACKEND_DOMAIN} \
            -var=dns_zone_name=${{ vars.STACKRAMP_DNS_ZONE || '' }}"

          if [ -n "$CUSTOM_DOMAIN" ]; then
            terraform apply -auto-approve -target=google_firebase_hosting_custom_domain.app $TF_VARS
          fi
          terraform apply -auto-approve $TF_VARS

      - name: Capture prod outputs
        id: tf-out-prod
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          echo "backend_url=$(terraform output -raw backend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "site_id=$(terraform output -raw site_id 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy frontend (if changed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend
    needs: [parse-config, provision]
    if: |
      needs.parse-config.outputs.has_frontend == 'true' &&
      (needs.parse-config.outputs.frontend_changed == 'true' || github.event_name == 'workflow_dispatch')
    uses: bobbydeveaux/stackramp/.github/workflows/_frontend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      frontend_dir: ${{ needs.parse-config.outputs.frontend_dir }}
      frontend_framework: ${{ needs.parse-config.outputs.frontend_framework }}
      environment: ${{ github.event_name == 'pull_request' && 'preview' || 'dev' }}
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      has_backend: ${{ needs.parse-config.outputs.has_backend }}
      backend_url: ""
      site_id: ${{ needs.provision.outputs.site_id_dev }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy backend (if changed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend
    needs: [parse-config, provision]
    if: |
      needs.parse-config.outputs.has_backend == 'true' &&
      (needs.parse-config.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch')
    uses: bobbydeveaux/stackramp/.github/workflows/_backend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      backend_dir: ${{ needs.parse-config.outputs.backend_dir }}
      backend_language: ${{ needs.parse-config.outputs.backend_language }}
      backend_port: ${{ fromJson(needs.parse-config.outputs.backend_port) }}
      environment: ${{ github.event_name == 'pull_request' && 'preview' || 'dev' }}
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      frontend_url: ${{ needs.provision.outputs.frontend_url_dev }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Deploy to PROD (main branch only, after dev succeeds)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend-prod:
    name: Frontend → prod
    needs: [parse-config, provision, deploy-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.parse-config.outputs.has_frontend == 'true' &&
      needs.deploy-frontend.result == 'success'
    uses: bobbydeveaux/stackramp/.github/workflows/_frontend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      frontend_dir: ${{ needs.parse-config.outputs.frontend_dir }}
      frontend_framework: ${{ needs.parse-config.outputs.frontend_framework }}
      environment: prod
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      is_pr: false
      has_backend: ${{ needs.parse-config.outputs.has_backend }}
      backend_url: ""
      site_id: ${{ needs.provision.outputs.site_id_prod }}

  deploy-backend-prod:
    name: Backend → prod
    needs: [parse-config, deploy-backend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.parse-config.outputs.has_backend == 'true' &&
      needs.deploy-backend.result == 'success'
    uses: bobbydeveaux/stackramp/.github/workflows/_backend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      backend_dir: ${{ needs.parse-config.outputs.backend_dir }}
      backend_language: ${{ needs.parse-config.outputs.backend_language }}
      backend_port: ${{ fromJson(needs.parse-config.outputs.backend_port) }}
      environment: prod
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      frontend_url: ${{ needs.provision.outputs.frontend_url_prod }}
