name: StackRamp Platform Deploy

# This is the ONLY workflow file that consuming repos reference.
# Usage in your repo's .github/workflows/deploy.yml:
#
#   jobs:
#     deploy:
#       permissions:
#         id-token: write       # required for WIF / GCP auth
#         contents: read        # required to checkout code
#         pull-requests: write  # required to post PR preview URLs
#       uses: bobbydeveaux/stackramp/.github/workflows/platform.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to stackramp.yaml (default: stackramp.yaml)"
        type: string
        required: false
        default: "stackramp.yaml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Cleanup preview environment when PR is closed
  # ─────────────────────────────────────────────────────────────────────────────
  cleanup-preview:
    name: Cleanup PR preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    uses: bobbydeveaux/stackramp/.github/workflows/_cleanup-preview.yml@main
    secrets: inherit

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Parse stackramp.yaml and detect what changed
  # ─────────────────────────────────────────────────────────────────────────────
  parse-config:
    name: Parse stackramp.yaml
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.config.outputs.app_name }}
      has_frontend: ${{ steps.config.outputs.has_frontend }}
      has_backend: ${{ steps.config.outputs.has_backend }}
      frontend_dir: ${{ steps.config.outputs.frontend_dir }}
      frontend_framework: ${{ steps.config.outputs.frontend_framework }}
      backend_dir: ${{ steps.config.outputs.backend_dir }}
      backend_language: ${{ steps.config.outputs.backend_language }}
      backend_port: ${{ steps.config.outputs.backend_port }}
      has_database: ${{ steps.config.outputs.has_database }}
      provider: ${{ steps.config.outputs.provider }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      backend_changed: ${{ steps.changes.outputs.backend }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      custom_domain: ${{ steps.config.outputs.custom_domain }}
      has_storage: ${{ steps.config.outputs.has_storage }}
      storage_type: ${{ steps.config.outputs.storage_type }}
      storage_buckets: ${{ steps.config.outputs.storage_buckets }}
      has_sso: ${{ steps.config.outputs.has_sso }}
      min_instances: ${{ steps.config.outputs.min_instances }}
      migrate_command: ${{ steps.config.outputs.migrate_command }}
      security_enabled: ${{ steps.config.outputs.security_enabled }}
      security_scan_osv: ${{ steps.config.outputs.security_scan_osv }}
      security_scan_secrets: ${{ steps.config.outputs.security_scan_secrets }}
      security_scan_sast: ${{ steps.config.outputs.security_scan_sast }}
      security_fail_on_findings: ${{ steps.config.outputs.security_fail_on_findings }}
      quality_enabled: ${{ steps.config.outputs.quality_enabled }}
      quality_max_ccn: ${{ steps.config.outputs.quality_max_ccn }}
      quality_max_cognitive: ${{ steps.config.outputs.quality_max_cognitive }}
      quality_max_duplication: ${{ steps.config.outputs.quality_max_duplication }}
      quality_min_maintainability: ${{ steps.config.outputs.quality_min_maintainability }}
      quality_fail_on_gate: ${{ steps.config.outputs.quality_fail_on_gate }}
      has_mcp: ${{ steps.config.outputs.has_mcp }}
      mcp_language: ${{ steps.config.outputs.mcp_language }}
      mcp_dir: ${{ steps.config.outputs.mcp_dir }}
      mcp_port: ${{ steps.config.outputs.mcp_port }}
      mcp_memory: ${{ steps.config.outputs.mcp_memory }}
      mcp_cpu: ${{ steps.config.outputs.mcp_cpu }}
      mcp_public: ${{ steps.config.outputs.mcp_public }}
      mcp_service_accounts: ${{ steps.config.outputs.mcp_service_accounts }}
      mcp_changed: ${{ steps.changes.outputs.mcp }}
      has_kubernetes: ${{ steps.config.outputs.has_kubernetes }}
      kubernetes_chart: ${{ steps.config.outputs.kubernetes_chart }}
      kubernetes_namespace: ${{ steps.config.outputs.kubernetes_namespace }}
      kubernetes_domain: ${{ steps.config.outputs.kubernetes_domain }}
      kubernetes_values: ${{ steps.config.outputs.kubernetes_values }}
      kubernetes_images: ${{ steps.config.outputs.kubernetes_images }}
      kubernetes_changed: ${{ steps.changes.outputs.kubernetes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse config
        id: config
        uses: bobbydeveaux/stackramp/platform-action@main
        with:
          config_path: ${{ inputs.config_path }}
        env:
          # Used by the action to pre-validate resolved GCS bucket-name length
          # ({project}-{app}-{env}-{name} must be <= 63 chars).
          STACKRAMP_PROJECT: ${{ vars.STACKRAMP_PROJECT }}

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - '${{ steps.config.outputs.frontend_dir }}/**'
              - '${{ inputs.config_path }}'
            backend:
              - '${{ steps.config.outputs.backend_dir }}/**'
              - '${{ inputs.config_path }}'
            mcp:
              - '${{ steps.config.outputs.mcp_dir }}/**'
              - '${{ inputs.config_path }}'
            kubernetes:
              - '${{ steps.config.outputs.kubernetes_chart }}/**'
              - '${{ inputs.config_path }}'

  # ─────────────────────────────────────────────────────────────────────────────
  # 1.5a. Security scan (Guardian) — runs before provisioning
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [parse-config]
    if: |
      github.event.action != 'closed' &&
      needs.parse-config.outputs.security_enabled == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guardian Security Scan
        uses: bobbydeveaux/guardian@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan_osv: ${{ needs.parse-config.outputs.security_scan_osv }}
          scan_secrets: ${{ needs.parse-config.outputs.security_scan_secrets }}
          scan_sast: ${{ needs.parse-config.outputs.security_scan_sast }}
          fail_on_findings: ${{ needs.parse-config.outputs.security_fail_on_findings }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 1.5b. Quality gate (Pulse) — runs before provisioning
  # ─────────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    needs: [parse-config]
    if: |
      github.event.action != 'closed' &&
      needs.parse-config.outputs.quality_enabled == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pulse Quality Gate
        uses: bobbydeveaux/pulse@main
        with:
          max_ccn: ${{ needs.parse-config.outputs.quality_max_ccn }}
          max_cognitive: ${{ needs.parse-config.outputs.quality_max_cognitive }}
          max_duplication: ${{ needs.parse-config.outputs.quality_max_duplication }}
          min_maintainability: ${{ needs.parse-config.outputs.quality_min_maintainability }}
          fail_on_gate: ${{ needs.parse-config.outputs.quality_fail_on_gate }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Provision app infrastructure (idempotent)
  # ─────────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    needs: [parse-config, security-scan, quality-gate]
    if: |
      always() &&
      needs.parse-config.result == 'success' &&
      (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped') &&
      (needs.quality-gate.result == 'success' || needs.quality-gate.result == 'skipped')
    outputs:
      backend_url_dev: ${{ steps.tf-out-dev.outputs.backend_url }}
      backend_url_prod: ${{ steps.tf-out-prod.outputs.backend_url }}
      frontend_url_dev: ${{ steps.tf-out-dev.outputs.frontend_url }}
      frontend_url_prod: ${{ steps.tf-out-prod.outputs.frontend_url }}
      site_id_dev: ${{ steps.tf-out-dev.outputs.site_id }}
      site_id_prod: ${{ steps.tf-out-prod.outputs.site_id }}
      storage_bucket_dev: ${{ steps.tf-out-dev.outputs.storage_bucket }}
      storage_bucket_prod: ${{ steps.tf-out-prod.outputs.storage_bucket }}
      bucket_env_json_dev: ${{ steps.tf-out-dev.outputs.bucket_env_json }}
      bucket_env_json_prod: ${{ steps.tf-out-prod.outputs.bucket_env_json }}
      database_secret_name_dev: ${{ steps.tf-out-dev.outputs.database_secret_name }}
      database_secret_name_prod: ${{ steps.tf-out-prod.outputs.database_secret_name }}
      k8s_cloudsql_sa_email_dev: ${{ steps.tf-out-dev.outputs.k8s_cloudsql_sa_email }}
      k8s_cloudsql_sa_email_prod: ${{ steps.tf-out-prod.outputs.k8s_cloudsql_sa_email }}
      k8s_cloudsql_ksa_dev: ${{ steps.tf-out-dev.outputs.k8s_cloudsql_ksa }}
      k8s_cloudsql_ksa_prod: ${{ steps.tf-out-prod.outputs.k8s_cloudsql_ksa }}
      k8s_secret_prefix_dev: ${{ steps.tf-out-dev.outputs.k8s_secret_prefix }}
      k8s_secret_prefix_prod: ${{ steps.tf-out-prod.outputs.k8s_secret_prefix }}
      k8s_namespace_dev: ${{ steps.tf-out-dev.outputs.k8s_namespace }}
      k8s_namespace_prod: ${{ steps.tf-out-prod.outputs.k8s_namespace }}
      mcp_url_dev: ${{ steps.tf-out-dev.outputs.mcp_url }}
      mcp_url_prod: ${{ steps.tf-out-prod.outputs.mcp_url }}
    steps:
      - name: Checkout StackRamp platform
        uses: actions/checkout@v4
        with:
          repository: bobbydeveaux/stackramp
          ref: main
          path: .stackramp

      - name: Authenticate to Google Cloud
        uses: bobbydeveaux/stackramp/providers/gcp/workflows/auth@main
        with:
          wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
          service_account: ${{ vars.STACKRAMP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.STACKRAMP_PROJECT }}-tf-state" \
            -backend-config="prefix=${{ needs.parse-config.outputs.app_name }}-dev"

      - name: Detect DNS zone for custom domain
        id: dns
        run: |
          # Find the Cloud DNS managed zone authoritative for the app's domain
          # (longest dns_name suffix match) and whether the domain is that zone's
          # apex. No match → external domain (Terraform skips Cloud DNS; records
          # added at the registrar). This is what makes stackramp.io "just work"
          # and lets any bootstrap-provisioned custom domain work the same way.
          CUSTOM_DOMAIN="${{ needs.parse-config.outputs.custom_domain }}"
          ZONE_NAME=""; IS_APEX="false"
          if [ -n "$CUSTOM_DOMAIN" ]; then
            FQDN="${CUSTOM_DOMAIN}."
            BEST=0
            while read -r zname zdns; do
              [ -z "$zname" ] && continue
              case "$FQDN" in
                "$zdns"|*".$zdns")
                  zlen=${#zdns}
                  if [ "$zlen" -gt "$BEST" ]; then
                    BEST=$zlen
                    ZONE_NAME="$zname"
                    if [ "$FQDN" = "$zdns" ]; then IS_APEX="true"; else IS_APEX="false"; fi
                  fi
                  ;;
              esac
            done < <(gcloud dns managed-zones list --project="${{ vars.STACKRAMP_PROJECT }}" --format="value(name,dnsName)")
          fi
          if [ -n "$ZONE_NAME" ]; then
            echo "Domain '$CUSTOM_DOMAIN' → Cloud DNS zone '$ZONE_NAME' (apex=$IS_APEX); records managed automatically."
          elif [ -n "$CUSTOM_DOMAIN" ]; then
            echo "Domain '$CUSTOM_DOMAIN' has no Cloud DNS zone → external mode. Add the records Firebase reports at your registrar."
          fi
          echo "zone_name=$ZONE_NAME" >> "$GITHUB_OUTPUT"
          echo "is_apex=$IS_APEX" >> "$GITHUB_OUTPUT"

      - name: Terraform apply (dev)
        working-directory: .stackramp/providers/gcp/terraform/platform
        env:
          # buckets_json carries quotes/spaces, so it is passed via env and a
          # separate quoted -var argument rather than the unquoted TF_VARS blob.
          BUCKETS_JSON: ${{ needs.parse-config.outputs.storage_buckets }}
        run: |
          # An auto-generated base-domain subdomain (app.base_domain) gets its own
          # app.dev.base_domain for dev. An explicit custom domain set in stackramp.yaml
          # belongs to PROD only — dev must not bind it, or dev and prod would fight over
          # the same records in the same Cloud DNS zone. dev then uses its .web.app URL.
          CUSTOM_DOMAIN="${{ needs.parse-config.outputs.custom_domain }}"
          BASE_DOMAIN="${{ vars.STACKRAMP_BASE_DOMAIN }}"
          APP="${{ needs.parse-config.outputs.app_name }}"
          if [ -n "$CUSTOM_DOMAIN" ] && [ -n "$BASE_DOMAIN" ] && [ "$CUSTOM_DOMAIN" = "${APP}.${BASE_DOMAIN}" ]; then
            CUSTOM_DOMAIN="${APP}.dev.${BASE_DOMAIN}"
          elif [ -n "$CUSTOM_DOMAIN" ]; then
            CUSTOM_DOMAIN=""
          fi
          BACKEND_DOMAIN=""
          [ -n "$CUSTOM_DOMAIN" ] && [ "${{ needs.parse-config.outputs.has_backend }}" = "true" ] && BACKEND_DOMAIN="api.${CUSTOM_DOMAIN}"

          HAS_SSO="${{ needs.parse-config.outputs.has_sso }}"
          TF_VARS="-var=app_name=${{ needs.parse-config.outputs.app_name }} \
            -var=environment=dev \
            -var=platform_project=${{ vars.STACKRAMP_PROJECT }} \
            -var=region=${{ vars.STACKRAMP_REGION }} \
            -var=custom_domain=${CUSTOM_DOMAIN} \
            -var=backend_domain=${BACKEND_DOMAIN} \
            -var=dns_zone_name=${{ steps.dns.outputs.zone_name }} \
            -var=domain_is_apex=${{ steps.dns.outputs.is_apex }} \
            -var=has_backend=${{ needs.parse-config.outputs.has_backend == 'true' }} \
            -var=has_storage=${{ needs.parse-config.outputs.has_storage == 'true' }} \
            -var=has_database=${{ needs.parse-config.outputs.has_database == 'true' }} \
            -var=cloudsql_connection_name=${{ vars.STACKRAMP_CLOUDSQL_CONNECTION || '' }} \
            -var=has_sso=${HAS_SSO} \
            -var=iap_allowed_domain=${{ vars.STACKRAMP_IAP_DOMAIN || '' }} \
            -var=frontend_sa_email=${{ vars.STACKRAMP_FRONTEND_SA || '' }} \
            -var=has_mcp=${{ needs.parse-config.outputs.has_mcp == 'true' }} \
            -var=has_kubernetes=${{ needs.parse-config.outputs.has_kubernetes == 'true' }} \
            -var=kubernetes_namespace=${{ needs.parse-config.outputs.kubernetes_namespace }} \
            -var=gke_gateway_ip=${{ vars.STACKRAMP_GKE_GATEWAY_IP }}"

          terraform apply -auto-approve $TF_VARS -var="buckets_json=${BUCKETS_JSON:-[]}"

      - name: Capture dev outputs
        id: tf-out-dev
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          echo "backend_url=$(terraform output -raw backend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "site_id=$(terraform output -raw site_id 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "storage_bucket=$(terraform output -raw storage_bucket 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "bucket_env_json=$(terraform output -raw bucket_env_json 2>/dev/null || echo '{}')" >> $GITHUB_OUTPUT
          echo "database_secret_name=$(terraform output -raw database_secret_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "k8s_cloudsql_sa_email=$(terraform output -raw k8s_cloudsql_sa_email 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "k8s_cloudsql_ksa=$(terraform output -raw k8s_cloudsql_ksa 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "k8s_secret_prefix=$(terraform output -raw k8s_secret_prefix 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "k8s_namespace=$(terraform output -raw k8s_namespace 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "mcp_url=$(terraform output -raw mcp_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Terraform init (prod)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.STACKRAMP_PROJECT }}-tf-state" \
            -backend-config="prefix=${{ needs.parse-config.outputs.app_name }}-prod"

      - name: Terraform apply (prod — main branch only)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        working-directory: .stackramp/providers/gcp/terraform/platform
        env:
          BUCKETS_JSON: ${{ needs.parse-config.outputs.storage_buckets }}
        run: |
          CUSTOM_DOMAIN="${{ needs.parse-config.outputs.custom_domain }}"
          BACKEND_DOMAIN=""
          [ -n "$CUSTOM_DOMAIN" ] && [ "${{ needs.parse-config.outputs.has_backend }}" = "true" ] && BACKEND_DOMAIN="api.${CUSTOM_DOMAIN}"

          HAS_SSO="${{ needs.parse-config.outputs.has_sso }}"
          TF_VARS="-var=app_name=${{ needs.parse-config.outputs.app_name }} \
            -var=environment=prod \
            -var=platform_project=${{ vars.STACKRAMP_PROJECT }} \
            -var=region=${{ vars.STACKRAMP_REGION }} \
            -var=custom_domain=${CUSTOM_DOMAIN} \
            -var=backend_domain=${BACKEND_DOMAIN} \
            -var=dns_zone_name=${{ steps.dns.outputs.zone_name }} \
            -var=domain_is_apex=${{ steps.dns.outputs.is_apex }} \
            -var=has_backend=${{ needs.parse-config.outputs.has_backend == 'true' }} \
            -var=has_storage=${{ needs.parse-config.outputs.has_storage == 'true' }} \
            -var=has_database=${{ needs.parse-config.outputs.has_database == 'true' }} \
            -var=cloudsql_connection_name=${{ vars.STACKRAMP_CLOUDSQL_CONNECTION || '' }} \
            -var=has_sso=${HAS_SSO} \
            -var=iap_allowed_domain=${{ vars.STACKRAMP_IAP_DOMAIN || '' }} \
            -var=frontend_sa_email=${{ vars.STACKRAMP_FRONTEND_SA || '' }} \
            -var=has_mcp=${{ needs.parse-config.outputs.has_mcp == 'true' }} \
            -var=has_kubernetes=${{ needs.parse-config.outputs.has_kubernetes == 'true' }} \
            -var=kubernetes_namespace=${{ needs.parse-config.outputs.kubernetes_namespace }} \
            -var=gke_gateway_ip=${{ vars.STACKRAMP_GKE_GATEWAY_IP }}"

          terraform apply -auto-approve $TF_VARS -var="buckets_json=${BUCKETS_JSON:-[]}"

      - name: Capture prod outputs
        id: tf-out-prod
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        working-directory: .stackramp/providers/gcp/terraform/platform
        run: |
          echo "backend_url=$(terraform output -raw backend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "site_id=$(terraform output -raw site_id 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "storage_bucket=$(terraform output -raw storage_bucket 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "bucket_env_json=$(terraform output -raw bucket_env_json 2>/dev/null || echo '{}')" >> $GITHUB_OUTPUT
          echo "database_secret_name=$(terraform output -raw database_secret_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "k8s_cloudsql_sa_email=$(terraform output -raw k8s_cloudsql_sa_email 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "k8s_cloudsql_ksa=$(terraform output -raw k8s_cloudsql_ksa 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "k8s_secret_prefix=$(terraform output -raw k8s_secret_prefix 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "k8s_namespace=$(terraform output -raw k8s_namespace 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "mcp_url=$(terraform output -raw mcp_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy frontend (if changed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend
    needs: [parse-config, provision, deploy-backend]
    if: |
      always() &&
      needs.parse-config.result == 'success' && needs.provision.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      needs.parse-config.outputs.has_frontend == 'true' &&
      (needs.parse-config.outputs.frontend_changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request')
    uses: bobbydeveaux/stackramp/.github/workflows/_frontend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      frontend_dir: ${{ needs.parse-config.outputs.frontend_dir }}
      frontend_framework: ${{ needs.parse-config.outputs.frontend_framework }}
      environment: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'dev' }}
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      has_backend: ${{ needs.parse-config.outputs.has_backend }}
      backend_url: ${{ needs.provision.outputs.backend_url_dev }}
      site_id: ${{ needs.provision.outputs.site_id_dev }}
      sso: ${{ needs.parse-config.outputs.has_sso }}
      custom_domain: ${{ needs.parse-config.outputs.custom_domain }}
      vpc_connector: ${{ vars.STACKRAMP_VPC_CONNECTOR || '' }}
      frontend_sa: ${{ vars.STACKRAMP_FRONTEND_SA || '' }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy backend (if changed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend
    needs: [parse-config, provision]
    if: |
      needs.provision.result == 'success' &&
      needs.parse-config.outputs.has_backend == 'true' &&
      (needs.parse-config.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request')
    uses: bobbydeveaux/stackramp/.github/workflows/_backend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      backend_dir: ${{ needs.parse-config.outputs.backend_dir }}
      backend_language: ${{ needs.parse-config.outputs.backend_language }}
      backend_port: ${{ fromJson(needs.parse-config.outputs.backend_port) }}
      environment: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'dev' }}
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      frontend_url: ${{ needs.provision.outputs.frontend_url_dev }}
      storage_bucket: ${{ needs.provision.outputs.storage_bucket_dev }}
      bucket_env_json: ${{ needs.provision.outputs.bucket_env_json_dev }}
      cloudsql_connection_name: ${{ vars.STACKRAMP_CLOUDSQL_CONNECTION || '' }}
      vpc_connector: ${{ vars.STACKRAMP_VPC_CONNECTOR || '' }}
      database_secret_name: ${{ needs.provision.outputs.database_secret_name_dev }}
      min_instances: ${{ needs.parse-config.outputs.min_instances }}
      sso: ${{ needs.parse-config.outputs.has_sso }}
      frontend_sa: ${{ vars.STACKRAMP_FRONTEND_SA || '' }}
      migrate_command: ${{ needs.parse-config.outputs.migrate_command }}
      extra_env_vars: ${{ needs.parse-config.outputs.has_mcp == 'true' && format('MCP_URL={0}', needs.provision.outputs.mcp_url_dev) || '' }}

  deploy-mcp:
    name: MCP server
    needs: [parse-config, provision]
    if: |
      needs.provision.result == 'success' &&
      needs.parse-config.outputs.has_mcp == 'true' &&
      (needs.parse-config.outputs.mcp_changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request')
    uses: bobbydeveaux/stackramp/.github/workflows/_mcp.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      mcp_dir: ${{ needs.parse-config.outputs.mcp_dir }}
      mcp_language: ${{ needs.parse-config.outputs.mcp_language }}
      mcp_port: ${{ fromJson(needs.parse-config.outputs.mcp_port) }}
      environment: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'dev' }}
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      frontend_url: ${{ needs.provision.outputs.frontend_url_dev }}
      backend_url: ${{ needs.provision.outputs.backend_url_dev }}
      memory: ${{ needs.parse-config.outputs.mcp_memory }}
      cpu: ${{ needs.parse-config.outputs.mcp_cpu }}
      iap_allowed_domain: ${{ vars.STACKRAMP_IAP_DOMAIN || '' }}
      vpc_connector: ${{ vars.STACKRAMP_VPC_CONNECTOR || '' }}
      public: ${{ needs.parse-config.outputs.mcp_public }}
      extra_env_vars: ${{ needs.parse-config.outputs.mcp_service_accounts != '' && format('MCP_SERVICE_ACCOUNTS={0}', needs.parse-config.outputs.mcp_service_accounts) || '' }}

  deploy-kubernetes:
    name: Kubernetes app
    needs: [parse-config, provision]
    if: |
      needs.provision.result == 'success' &&
      needs.parse-config.outputs.has_kubernetes == 'true' &&
      (needs.parse-config.outputs.kubernetes_changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request')
    uses: bobbydeveaux/stackramp/.github/workflows/_kubernetes.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      chart: ${{ needs.parse-config.outputs.kubernetes_chart }}
      namespace: ${{ needs.provision.outputs.k8s_namespace_dev }}
      custom_domain: ${{ needs.parse-config.outputs.custom_domain }}
      base_domain: ${{ vars.STACKRAMP_BASE_DOMAIN }}
      values_json: ${{ needs.parse-config.outputs.kubernetes_values }}
      images_json: ${{ needs.parse-config.outputs.kubernetes_images }}
      environment: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'dev' }}
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      gke_cluster: ${{ vars.STACKRAMP_GKE_CLUSTER }}
      gke_location: ${{ vars.STACKRAMP_GKE_LOCATION }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      cloudsql_sa_email: ${{ needs.provision.outputs.k8s_cloudsql_sa_email_dev }}
      cloudsql_ksa: ${{ needs.provision.outputs.k8s_cloudsql_ksa_dev }}
      secret_prefix: ${{ needs.provision.outputs.k8s_secret_prefix_dev }}
      gateway_name: ${{ vars.STACKRAMP_GKE_GATEWAY_NAME }}
      gateway_namespace: ${{ vars.STACKRAMP_GKE_GATEWAY_NAMESPACE }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Deploy to PROD (main branch only, after dev succeeds)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend-prod:
    name: Frontend → prod
    needs: [parse-config, provision, deploy-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.provision.result == 'success' &&
      needs.parse-config.outputs.has_frontend == 'true' &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped')
    uses: bobbydeveaux/stackramp/.github/workflows/_frontend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      frontend_dir: ${{ needs.parse-config.outputs.frontend_dir }}
      frontend_framework: ${{ needs.parse-config.outputs.frontend_framework }}
      environment: prod
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      is_pr: false
      has_backend: ${{ needs.parse-config.outputs.has_backend }}
      backend_url: ${{ needs.provision.outputs.backend_url_prod }}
      site_id: ${{ needs.provision.outputs.site_id_prod }}
      sso: ${{ needs.parse-config.outputs.has_sso }}
      custom_domain: ${{ needs.parse-config.outputs.custom_domain }}
      vpc_connector: ${{ vars.STACKRAMP_VPC_CONNECTOR || '' }}
      frontend_sa: ${{ vars.STACKRAMP_FRONTEND_SA || '' }}

  deploy-backend-prod:
    name: Backend → prod
    needs: [parse-config, provision, deploy-backend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.provision.result == 'success' &&
      needs.parse-config.outputs.has_backend == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    uses: bobbydeveaux/stackramp/.github/workflows/_backend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      backend_dir: ${{ needs.parse-config.outputs.backend_dir }}
      backend_language: ${{ needs.parse-config.outputs.backend_language }}
      backend_port: ${{ fromJson(needs.parse-config.outputs.backend_port) }}
      environment: prod
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      frontend_url: ${{ needs.provision.outputs.frontend_url_prod }}
      storage_bucket: ${{ needs.provision.outputs.storage_bucket_prod }}
      bucket_env_json: ${{ needs.provision.outputs.bucket_env_json_prod }}
      cloudsql_connection_name: ${{ vars.STACKRAMP_CLOUDSQL_CONNECTION || '' }}
      vpc_connector: ${{ vars.STACKRAMP_VPC_CONNECTOR || '' }}
      database_secret_name: ${{ needs.provision.outputs.database_secret_name_prod }}
      min_instances: ${{ needs.parse-config.outputs.min_instances }}
      sso: ${{ needs.parse-config.outputs.has_sso }}
      frontend_sa: ${{ vars.STACKRAMP_FRONTEND_SA || '' }}
      migrate_command: ${{ needs.parse-config.outputs.migrate_command }}
      extra_env_vars: ${{ needs.parse-config.outputs.has_mcp == 'true' && format('MCP_URL={0}', needs.provision.outputs.mcp_url_prod) || '' }}

  deploy-mcp-prod:
    name: MCP server → prod
    needs: [parse-config, provision, deploy-mcp]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.provision.result == 'success' &&
      needs.parse-config.outputs.has_mcp == 'true' &&
      (needs.deploy-mcp.result == 'success' || needs.deploy-mcp.result == 'skipped')
    uses: bobbydeveaux/stackramp/.github/workflows/_mcp.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      mcp_dir: ${{ needs.parse-config.outputs.mcp_dir }}
      mcp_language: ${{ needs.parse-config.outputs.mcp_language }}
      mcp_port: ${{ fromJson(needs.parse-config.outputs.mcp_port) }}
      environment: prod
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      frontend_url: ${{ needs.provision.outputs.frontend_url_prod }}
      backend_url: ${{ needs.provision.outputs.backend_url_prod }}
      memory: ${{ needs.parse-config.outputs.mcp_memory }}
      cpu: ${{ needs.parse-config.outputs.mcp_cpu }}
      iap_allowed_domain: ${{ vars.STACKRAMP_IAP_DOMAIN || '' }}
      vpc_connector: ${{ vars.STACKRAMP_VPC_CONNECTOR || '' }}
      public: ${{ needs.parse-config.outputs.mcp_public }}
      extra_env_vars: ${{ needs.parse-config.outputs.mcp_service_accounts != '' && format('MCP_SERVICE_ACCOUNTS={0}', needs.parse-config.outputs.mcp_service_accounts) || '' }}

  deploy-kubernetes-prod:
    name: Kubernetes app → prod
    needs: [parse-config, provision, deploy-kubernetes]
    if: |
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.provision.result == 'success' &&
      needs.parse-config.outputs.has_kubernetes == 'true' &&
      (needs.deploy-kubernetes.result == 'success' || needs.deploy-kubernetes.result == 'skipped')
    uses: bobbydeveaux/stackramp/.github/workflows/_kubernetes.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      chart: ${{ needs.parse-config.outputs.kubernetes_chart }}
      namespace: ${{ needs.provision.outputs.k8s_namespace_prod }}
      custom_domain: ${{ needs.parse-config.outputs.custom_domain }}
      base_domain: ${{ vars.STACKRAMP_BASE_DOMAIN }}
      values_json: ${{ needs.parse-config.outputs.kubernetes_values }}
      images_json: ${{ needs.parse-config.outputs.kubernetes_images }}
      environment: prod
      platform_project: ${{ vars.STACKRAMP_PROJECT }}
      region: ${{ vars.STACKRAMP_REGION || 'europe-west1' }}
      gke_cluster: ${{ vars.STACKRAMP_GKE_CLUSTER }}
      gke_location: ${{ vars.STACKRAMP_GKE_LOCATION }}
      wif_provider: ${{ vars.STACKRAMP_WIF_PROVIDER }}
      service_account: ${{ vars.STACKRAMP_SA_EMAIL }}
      cloudsql_sa_email: ${{ needs.provision.outputs.k8s_cloudsql_sa_email_prod }}
      cloudsql_ksa: ${{ needs.provision.outputs.k8s_cloudsql_ksa_prod }}
      secret_prefix: ${{ needs.provision.outputs.k8s_secret_prefix_prod }}
      gateway_name: ${{ vars.STACKRAMP_GKE_GATEWAY_NAME }}
      gateway_namespace: ${{ vars.STACKRAMP_GKE_GATEWAY_NAMESPACE }}
