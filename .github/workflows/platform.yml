name: Launchpad Platform Deploy

# This is the ONLY workflow file that consuming repos reference.
# Usage in your repo's .github/workflows/deploy.yml:
#
#   jobs:
#     deploy:
#       permissions:
#         id-token: write       # required for WIF / GCP auth
#         contents: read        # required to checkout code
#         pull-requests: write  # required to post PR preview URLs
#       uses: bobbydeveaux/launchpad/.github/workflows/platform.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to launchpad.yaml (default: launchpad.yaml)"
        type: string
        required: false
        default: "launchpad.yaml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Parse launchpad.yaml and detect what changed
  # ─────────────────────────────────────────────────────────────────────────────
  parse-config:
    name: Parse launchpad.yaml
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.config.outputs.app_name }}
      has_frontend: ${{ steps.config.outputs.has_frontend }}
      has_backend: ${{ steps.config.outputs.has_backend }}
      frontend_dir: ${{ steps.config.outputs.frontend_dir }}
      frontend_framework: ${{ steps.config.outputs.frontend_framework }}
      backend_dir: ${{ steps.config.outputs.backend_dir }}
      backend_language: ${{ steps.config.outputs.backend_language }}
      backend_port: ${{ steps.config.outputs.backend_port }}
      has_database: ${{ steps.config.outputs.has_database }}
      provider: ${{ steps.config.outputs.provider }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      backend_changed: ${{ steps.changes.outputs.backend }}
      is_pr: ${{ github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse config
        id: config
        uses: bobbydeveaux/launchpad/platform-action@main
        with:
          config_path: ${{ inputs.config_path }}

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - '${{ steps.config.outputs.frontend_dir }}/**'
              - 'launchpad.yaml'
            backend:
              - '${{ steps.config.outputs.backend_dir }}/**'
              - 'launchpad.yaml'

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Provision app infrastructure (idempotent)
  # ─────────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    needs: [parse-config]
    outputs:
      backend_url_dev: ${{ steps.tf-out-dev.outputs.backend_url }}
      backend_url_prod: ${{ steps.tf-out-prod.outputs.backend_url }}
    steps:
      - name: Checkout Launchpad platform
        uses: actions/checkout@v4
        with:
          repository: bobbydeveaux/launchpad
          path: .launchpad

      - name: Authenticate to Google Cloud
        uses: bobbydeveaux/launchpad/providers/gcp/workflows/auth@main
        with:
          wif_provider: ${{ vars.LAUNCHPAD_WIF_PROVIDER }}
          service_account: ${{ vars.LAUNCHPAD_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: .launchpad/providers/gcp/terraform/platform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.LAUNCHPAD_PROJECT }}-tf-state" \
            -backend-config="prefix=${{ needs.parse-config.outputs.app_name }}-dev"

      - name: Terraform apply (dev)
        working-directory: .launchpad/providers/gcp/terraform/platform
        run: |
          terraform apply -auto-approve \
            -var="app_name=${{ needs.parse-config.outputs.app_name }}" \
            -var="environment=dev" \
            -var="platform_project=${{ vars.LAUNCHPAD_PROJECT }}" \
            -var="region=${{ vars.LAUNCHPAD_REGION }}"

      - name: Capture dev backend URL
        id: tf-out-dev
        working-directory: .launchpad/providers/gcp/terraform/platform
        run: echo "backend_url=$(terraform output -raw backend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Terraform init (prod)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: .launchpad/providers/gcp/terraform/platform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.LAUNCHPAD_PROJECT }}-tf-state" \
            -backend-config="prefix=${{ needs.parse-config.outputs.app_name }}-prod"

      - name: Terraform apply (prod — main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: .launchpad/providers/gcp/terraform/platform
        run: |
          terraform apply -auto-approve \
            -var="app_name=${{ needs.parse-config.outputs.app_name }}" \
            -var="environment=prod" \
            -var="platform_project=${{ vars.LAUNCHPAD_PROJECT }}" \
            -var="region=${{ vars.LAUNCHPAD_REGION }}"

      - name: Capture prod backend URL
        id: tf-out-prod
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: .launchpad/providers/gcp/terraform/platform
        run: echo "backend_url=$(terraform output -raw backend_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy frontend (if changed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend
    needs: [parse-config, provision]
    if: |
      needs.parse-config.outputs.has_frontend == 'true' &&
      (needs.parse-config.outputs.frontend_changed == 'true' || github.event_name == 'workflow_dispatch')
    uses: bobbydeveaux/launchpad/.github/workflows/_frontend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      frontend_dir: ${{ needs.parse-config.outputs.frontend_dir }}
      frontend_framework: ${{ needs.parse-config.outputs.frontend_framework }}
      environment: ${{ github.event_name == 'pull_request' && 'preview' || 'dev' }}
      platform_project: ${{ vars.LAUNCHPAD_PROJECT }}
      region: ${{ vars.LAUNCHPAD_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.LAUNCHPAD_WIF_PROVIDER }}
      service_account: ${{ vars.LAUNCHPAD_SA_EMAIL }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      backend_url: ${{ needs.provision.outputs.backend_url_dev }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy backend (if changed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend
    needs: [parse-config, provision]
    if: |
      needs.parse-config.outputs.has_backend == 'true' &&
      (needs.parse-config.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch')
    uses: bobbydeveaux/launchpad/.github/workflows/_backend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      backend_dir: ${{ needs.parse-config.outputs.backend_dir }}
      backend_language: ${{ needs.parse-config.outputs.backend_language }}
      backend_port: ${{ fromJson(needs.parse-config.outputs.backend_port) }}
      environment: ${{ github.event_name == 'pull_request' && 'preview' || 'dev' }}
      platform_project: ${{ vars.LAUNCHPAD_PROJECT }}
      region: ${{ vars.LAUNCHPAD_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.LAUNCHPAD_WIF_PROVIDER }}
      service_account: ${{ vars.LAUNCHPAD_SA_EMAIL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Deploy to PROD (main branch only, after dev succeeds)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend-prod:
    name: Frontend → prod
    needs: [parse-config, provision, deploy-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.parse-config.outputs.has_frontend == 'true' &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped')
    uses: bobbydeveaux/launchpad/.github/workflows/_frontend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      frontend_dir: ${{ needs.parse-config.outputs.frontend_dir }}
      frontend_framework: ${{ needs.parse-config.outputs.frontend_framework }}
      environment: prod
      platform_project: ${{ vars.LAUNCHPAD_PROJECT }}
      region: ${{ vars.LAUNCHPAD_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.LAUNCHPAD_WIF_PROVIDER }}
      service_account: ${{ vars.LAUNCHPAD_SA_EMAIL }}
      is_pr: false
      backend_url: ${{ needs.provision.outputs.backend_url_prod }}

  deploy-backend-prod:
    name: Backend → prod
    needs: [parse-config, deploy-backend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.parse-config.outputs.has_backend == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    uses: bobbydeveaux/launchpad/.github/workflows/_backend.yml@main
    secrets: inherit
    with:
      app_name: ${{ needs.parse-config.outputs.app_name }}
      backend_dir: ${{ needs.parse-config.outputs.backend_dir }}
      backend_language: ${{ needs.parse-config.outputs.backend_language }}
      backend_port: ${{ fromJson(needs.parse-config.outputs.backend_port) }}
      environment: prod
      platform_project: ${{ vars.LAUNCHPAD_PROJECT }}
      region: ${{ vars.LAUNCHPAD_REGION || 'europe-west1' }}
      wif_provider: ${{ vars.LAUNCHPAD_WIF_PROVIDER }}
      service_account: ${{ vars.LAUNCHPAD_SA_EMAIL }}
